<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaizen Trade Autopsy</title>

  <!-- React + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>

  <!-- Recharts dependencies -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-scale@4.0.2/dist/d3-scale.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-shape@3.2.0/dist/d3-shape.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-interpolate@3.0.1/dist/d3-interpolate.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-color@3.1.0/dist/d3-color.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-format@3.1.0/dist/d3-format.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-time@3.1.0/dist/d3-time.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-time-format@4.1.0/dist/d3-time-format.min.js"></script>
  <script crossorigin src="https://unpkg.com/d3-path@3.1.0/dist/d3-path.min.js"></script>
  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e4e4e7;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ── Layout utilities ── */
    .flex { display: flex; }
    .flex-wrap { display: flex; flex-wrap: wrap; }
    .grid { display: grid; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }
    .mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .mb-5 { margin-bottom: 20px; } .mb-6 { margin-bottom: 24px; }
    .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; }
    .p-3 { padding: 12px; } .p-5 { padding: 20px; }
    .px-3 { padding-left: 12px; padding-right: 12px; }
    .px-4 { padding-left: 16px; padding-right: 16px; }
    .py-1 { padding-top: 4px; padding-bottom: 4px; }
    .py-2 { padding-top: 8px; padding-bottom: 8px; }
    .py-4 { padding-top: 16px; padding-bottom: 16px; }
    .space-y-2 > * + * { margin-top: 8px; }
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
    .rounded { border-radius: 4px; } .rounded-lg { border-radius: 8px; }
    .border { border-width: 1px; border-style: solid; }
    .border-zinc-700 { border-color: #3f3f46; }
    .border-zinc-800 { border-color: #27272a; }
    .bg-zinc-900 { background: #18181b; }
    .bg-zinc-950 { background: #09090b; }
    .text-xs { font-size: 11px; } .text-sm { font-size: 13px; }
    .text-xl { font-size: 20px; } .text-2xl { font-size: 24px; }
    .text-lg { font-size: 18px; }
    .font-mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .font-bold { font-weight: 700; }
    .italic { font-style: italic; }
    .uppercase { text-transform: uppercase; }
    .tracking-widest { letter-spacing: 0.2em; }
    .leading-relaxed { line-height: 1.8; }
    .resize-none { resize: none; }
    .text-white { color: #ffffff; }
    .text-zinc-100 { color: #f4f4f5; }
    .text-zinc-300 { color: #d4d4d8; }
    .text-zinc-400 { color: #a1a1aa; }
    .text-zinc-500 { color: #71717a; }
    .text-zinc-600 { color: #52525b; }
    .text-zinc-700 { color: #3f3f46; }
    .text-emerald-400 { color: #34d399; }
    .text-emerald-100 { color: #d1fae5; }
    .text-red-400 { color: #f87171; }
    .text-red-100 { color: #fee2e2; }
    .text-blue-400 { color: #60a5fa; }
    .text-blue-100 { color: #dbeafe; }
    .text-yellow-400 { color: #fbbf24; }
    .text-yellow-100 { color: #fef3c7; }
    .text-purple-100 { color: #f3e8ff; }

    /* ── Chips / Buttons ── */
    .chip-base {
      display: inline-block;
      padding: 4px 12px;
      font-size: 11px;
      border: 1px solid #3f3f46;
      border-radius: 4px;
      background: #18181b;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip-active-blue  { background: #1e1b4b !important; border-color: #6366f1 !important; color: #c7d2fe !important; }
    .chip-active-red   { background: #450a0a !important; border-color: #ef4444 !important; color: #fca5a5 !important; }
    .chip-active-green { background: #064e3b !important; border-color: #10b981 !important; color: #6ee7b7 !important; }
    .chip-active-yellow{ background: #422006 !important; border-color: #f59e0b !important; color: #fde68a !important; }
    .chip-active-purple{ background: #3b0764 !important; border-color: #a855f7 !important; color: #e9d5ff !important; }
    .grade-active-A { background: #064e3b !important; border-color: #34d399 !important; color: #d1fae5 !important; }
    .grade-active-B { background: #1e3a5f !important; border-color: #60a5fa !important; color: #dbeafe !important; }
    .grade-active-C { background: #422006 !important; border-color: #fbbf24 !important; color: #fef3c7 !important; }
    .grade-active-F { background: #450a0a !important; border-color: #f87171 !important; color: #fee2e2 !important; }

    /* ── Inputs ── */
    .field-input {
      background: #18181b;
      border: 1px solid #3f3f46;
      color: #f4f4f5;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
      width: 100%;
      font-family: inherit;
    }
    .field-input:focus { outline: none; border-color: #a1a1aa; }
    .field-input.small { font-size: 11px; padding: 4px 8px; }
    textarea.field-input { resize: none; }
    input::placeholder, textarea::placeholder { color: #3f3f46; }

    /* ── Nav tabs ── */
    .nav-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #71717a;
      padding: 10px 18px;
      font-size: 11px;
      font-family: inherit;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-tab:hover { color: #a1a1aa; }
    .nav-tab.active { border-bottom-color: #6366f1; color: #a5b4fc; }
    .nav-tab.active-logger { border-bottom-color: #f59e0b; color: #fde68a; }

    /* ── Mobile ── */
    @media(max-width: 760px) {
      .grid-cols-4, .grid-cols-3, .grid-cols-2 { grid-template-columns: 1fr !important; }
      .resp-header { flex-direction: column !important; align-items: flex-start !important; }
      .resp-header > div:last-child { flex-wrap: wrap !important; }
    }

    /* ── Print ── */
    @media print {
      @page { margin: 0.45in; }
      #app-nav { display: none !important; }
      body { background: #f4f4ef !important; color: #050505 !important;
        -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Recharts from global (with fallback stubs if CDN fails) ──
    const _RC = (typeof Recharts !== "undefined") ? Recharts : {};
    const LineChart        = _RC.LineChart        || (({children})=><div style={{color:"#71717a",fontSize:10,padding:8}}>Chart unavailable</div>);
    const Line             = _RC.Line             || (()=>null);
    const BarChart         = _RC.BarChart         || (({children})=><div style={{color:"#71717a",fontSize:10,padding:8}}>Chart unavailable</div>);
    const Bar              = _RC.Bar              || (()=>null);
    const XAxis            = _RC.XAxis            || (()=>null);
    const YAxis            = _RC.YAxis            || (()=>null);
    const Tooltip          = _RC.Tooltip          || (()=>null);
    const ResponsiveContainer = _RC.ResponsiveContainer || (({children,width,height})=><div style={{width:"100%",height:height||180}}>{children}</div>);
    const ReferenceLine    = _RC.ReferenceLine    || (()=>null);
    const Cell             = _RC.Cell             || (()=>null);

    // ── Storage helpers ──
    const SESSIONS_KEY = "kaizen:sessions";
    async function loadSessions() {
      try {
        const raw = localStorage.getItem(SESSIONS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }
    function saveSessions(sessions) {
      try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions)); } catch {}
    }

    // ── Constants ──
    const ENV_OPTIONS   = ["ROTATIONAL","TRENDING","CHOP","EXPANSION","UNKNOWN"];
    const GRADE_OPTIONS = ["A","B","C","F"];
    const SETUP_TAGS    = ["BREAKOUT","PULLBACK","REVERSAL","CONTINUATION","OPENING RANGE",
                            "FAILED AUCTION","ANTICIPATION","FOMO","CHASE","OTHER"];
    const LOSS_TAGS     = ["EARLY","CHOP","REVERSAL","CHASE","OVERSIZED","FOMO",
                            "LOW VOLUME","COUNTERTREND","OPENING RANGE NOISE","EXPANSION"];

    const emptyTrade = () => ({
      id: Date.now() + Math.random(),
      direction:"", time:"", entry:"", exit:"", result:"",
      grade:"", immediateFollowThrough:null, negotiable:null,
      mae:"", mfe:"", why:"", wouldTakeAgain:null,
      marketDid:null, lossTag:"", setupTag:"",
      doNothingOutcome:"", notes:"",
    });
    const emptySession = () => ({
      id: Date.now() + Math.random(),
      date: new Date().toISOString().slice(0,10),
      environment:"", environmentCorrect:null, firstTradeSetup:null,
      cheatScore:"", patienceScore:"", walkAways:"", reentryCount:"",
      sessionNotes:"", trades:[emptyTrade()], avoided:[], survived:null,
    });

    // ── Design tokens ──
    const mono = { fontFamily:"'JetBrains Mono','Courier New',monospace" };
    const C = {
      bg:"#08080a", surface:"#0f0f12", card:"#141417",
      border:"#27272a", border2:"#3f3f46",
      text:"#e4e4e7", muted:"#71717a", faint:"#3f3f46",
      green:"#10b981", greenBg:"#064e3b", greenText:"#6ee7b7",
      red:"#ef4444", redBg:"#450a0a", redText:"#fca5a5",
      blue:"#6366f1", blueBg:"#1e1b4b", blueText:"#a5b4fc",
      yellow:"#eab308", yellowBg:"#422006", yellowText:"#fde047",
      purple:"#a855f7",
    };

    // ════════════════════════════════════════════
    // SHARED COMPONENTS
    // ════════════════════════════════════════════

    function Chip({ label, active, onClick, color="blue" }) {
      return <button onClick={onClick} className={`chip-base ${active ? `chip-active-${color}` : ""}`}>{label}</button>;
    }
    function YesNo({ value, onChange, yesLabel="YES", noLabel="NO" }) {
      return (
        <div className="flex gap-2">
          <Chip label={yesLabel} active={value===true}  onClick={()=>onChange(value===true?null:true)}  color="green"/>
          <Chip label={noLabel}  active={value===false} onClick={()=>onChange(value===false?null:false)} color="red"/>
        </div>
      );
    }
    function Field({ label, hint, children }) {
      return (
        <div className="mb-4">
          <div className="text-xs font-mono text-zinc-400 uppercase tracking-widest mb-1">{label}</div>
          {hint && <div className="text-xs text-zinc-600 mb-2 italic">{hint}</div>}
          {children}
        </div>
      );
    }
    function Input({ value, onChange, placeholder, type="text", small }) {
      return <input type={type} value={value} onChange={e=>onChange(e.target.value)}
        placeholder={placeholder} className={`field-input${small?" small":""}`}/>;
    }
    function TextArea({ value, onChange, placeholder, rows=2 }) {
      return <textarea value={value} onChange={e=>onChange(e.target.value)}
        placeholder={placeholder} rows={rows} className="field-input"/>;
    }
    function GradeButton({ grade, active, onClick }) {
      const desc = {A:"Take again tomorrow",B:"Good, minor flaw",C:"Questionable",F:"Never should happen"};
      return (
        <button onClick={onClick} title={desc[grade]}
          className={`chip-base px-4 py-2 text-sm ${active?`grade-active-${grade}`:""}`}
          style={{padding:"8px 16px",fontSize:"13px"}}>{grade}</button>
      );
    }

    // ════════════════════════════════════════════
    // LOGGER COMPONENTS
    // ════════════════════════════════════════════

    function TradeCard({ trade, index, onChange, onRemove }) {
      const update = (key,val) => onChange({...trade,[key]:val});
      const resultNum = parseFloat(trade.result);
      const resultColor = isNaN(resultNum) ? "text-zinc-400" : resultNum>=0 ? "text-emerald-400" : "text-red-400";
      return (
        <div className="border border-zinc-700 rounded-lg p-5 mb-4 bg-zinc-950">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
            <div className="flex items-center gap-3">
              <span className="text-zinc-500 font-mono text-sm">TRADE</span>
              <span className="text-white font-mono text-xl font-bold">#{index+1}</span>
              {trade.result!==""&&<span className={`font-mono text-lg font-bold ${resultColor}`}>
                {resultNum>=0?"+"":""}{trade.result}</span>}
            </div>
            <button onClick={onRemove}
              style={{background:"none",border:"none",color:"#3f3f46",fontSize:"11px",cursor:"pointer"}}
              onMouseOver={e=>e.target.style.color="#a1a1aa"}
              onMouseOut={e=>e.target.style.color="#3f3f46"}>REMOVE</button>
          </div>
          {/* Row 1 */}
          <div className="grid grid-cols-4 gap-3 mb-4">
            <Field label="Time"><Input value={trade.time} onChange={v=>update("time",v)} placeholder="8:32"/></Field>
            <Field label="Direction">
              <div className="flex gap-2 mt-1">
                <Chip label="LONG"  active={trade.direction==="LONG"}  onClick={()=>update("direction",trade.direction==="LONG"?"":"LONG")}  color="green"/>
                <Chip label="SHORT" active={trade.direction==="SHORT"} onClick={()=>update("direction",trade.direction==="SHORT"?"":"SHORT")} color="red"/>
              </div>
            </Field>
            <Field label="Entry"><Input value={trade.entry} onChange={v=>update("entry",v)} placeholder="21,450"/></Field>
            <Field label="Exit"><Input value={trade.exit}  onChange={v=>update("exit",v)}  placeholder="21,460"/></Field>
          </div>
          {/* Result / MAE / MFE */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            <Field label="Result ($)" hint="Actual P&L in dollars">
              <Input value={trade.result} onChange={v=>update("result",v)} placeholder="+50"/>
            </Field>
            <Field label="MAE (pts)" hint="How far against you before resolution — TIER 1">
              <Input value={trade.mae} onChange={v=>update("mae",v)} placeholder="8"/>
            </Field>
            <Field label="MFE (pts)" hint="How far in your favor before exit">
              <Input value={trade.mfe} onChange={v=>update("mfe",v)} placeholder="12"/>
            </Field>
          </div>
          {/* IFT / Negotiable */}
          <div className="grid grid-cols-2 gap-6 mb-4">
            <Field label="Immediate Follow Through?" hint="Did price move your way almost immediately?">
              <YesNo value={trade.immediateFollowThrough} onChange={v=>update("immediateFollowThrough",v)}/>
            </Field>
            <Field label="Market Negotiable?" hint="Did you have time to manage discretion, or did it move too fast?">
              <YesNo value={trade.negotiable} onChange={v=>update("negotiable",v)}/>
            </Field>
          </div>
          {/* Why */}
          <Field label="Why Did I Take It?" hint="One sentence only.">
            <TextArea value={trade.why} onChange={v=>update("why",v)} placeholder="One sentence." rows={1}/>
          </Field>
          {/* Setup Tag */}
          <Field label="Setup Tag">
            <div className="flex flex-wrap gap-2">
              {SETUP_TAGS.map(t=>(
                <Chip key={t} label={t} active={trade.setupTag===t}
                  onClick={()=>update("setupTag",trade.setupTag===t?"":t)} color="blue"/>
              ))}
            </div>
          </Field>
          {/* Loss Tag — only negative */}
          {!isNaN(resultNum)&&resultNum<0&&(
            <Field label="Loss Category" hint="Tag every losing trade">
              <div className="flex flex-wrap gap-2">
                {LOSS_TAGS.map(t=>(
                  <Chip key={t} label={t} active={trade.lossTag===t}
                    onClick={()=>update("lossTag",trade.lossTag===t?"":t)} color="red"/>
                ))}
              </div>
            </Field>
          )}
          {/* Market Did / Would Take Again */}
          <div className="grid grid-cols-2 gap-6 mb-4">
            <Field label="Did Market Do What I Expected?">
              <YesNo value={trade.marketDid} onChange={v=>update("marketDid",v)}/>
            </Field>
            <Field label="Would Take Again?">
              <div className="flex gap-2">
                <Chip label="YES"   active={trade.wouldTakeAgain==="yes"}   onClick={()=>update("wouldTakeAgain",trade.wouldTakeAgain==="yes"?null:"yes")}   color="green"/>
                <Chip label="MAYBE" active={trade.wouldTakeAgain==="maybe"} onClick={()=>update("wouldTakeAgain",trade.wouldTakeAgain==="maybe"?null:"maybe")} color="yellow"/>
                <Chip label="NO"    active={trade.wouldTakeAgain==="no"}    onClick={()=>update("wouldTakeAgain",trade.wouldTakeAgain==="no"?null:"no")}    color="red"/>
              </div>
            </Field>
          </div>
          {/* Grade */}
          <Field label="Trade Grade" hint="Grade the TRADE, not the result. A losing trade can be an A.">
            <div className="flex gap-3">
              {GRADE_OPTIONS.map(g=>(
                <GradeButton key={g} grade={g} active={trade.grade===g}
                  onClick={()=>update("grade",trade.grade===g?"":g)}/>
              ))}
            </div>
          </Field>
          {/* Do Nothing */}
          <Field label="What Would've Happened If I Did Nothing?" hint="Forces comparison vs. the monster move: no trade.">
            <TextArea value={trade.doNothingOutcome} onChange={v=>update("doNothingOutcome",v)}
              placeholder="e.g. 'Better entry appeared 4 min later' / 'Saved $80' / 'Missed winner'" rows={1}/>
          </Field>
          {/* Notes */}
          <Field label="Notes / Lesson">
            <TextArea value={trade.notes} onChange={v=>update("notes",v)} placeholder="One sentence lesson." rows={1}/>
          </Field>
        </div>
      );
    }

    function SummaryPanel({ session }) {
      const trades = session.trades;
      const withResult = trades.filter(t=>t.result!==""&&!isNaN(parseFloat(t.result)));
      const totalPnL = withResult.reduce((s,t)=>s+parseFloat(t.result),0);
      const winners = withResult.filter(t=>parseFloat(t.result)>=0);
      const losers  = withResult.filter(t=>parseFloat(t.result)<0);
      const winRate = withResult.length>0?Math.round(winners.length/withResult.length*100):null;
      const winMAE  = winners.filter(t=>t.mae!=="").length>0
        ?(winners.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae||0),0)/winners.filter(t=>t.mae!=="").length).toFixed(1):null;
      const lossMAE = losers.filter(t=>t.mae!=="").length>0
        ?(losers.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae||0),0)/losers.filter(t=>t.mae!=="").length).toFixed(1):null;
      const iftYes=trades.filter(t=>t.immediateFollowThrough===true).length;
      const iftNo =trades.filter(t=>t.immediateFollowThrough===false).length;
      const negYes=trades.filter(t=>t.negotiable===true).length;
      const negNo =trades.filter(t=>t.negotiable===false).length;
      const gradeCounts={A:0,B:0,C:0,F:0};
      trades.forEach(t=>{if(t.grade)gradeCounts[t.grade]++;});
      const lossTags={};
      losers.forEach(t=>{if(t.lossTag)lossTags[t.lossTag]=(lossTags[t.lossTag]||0)+1;});
      const fiveQ=[
        {q:"Did I follow rules?",key:"followedRules"},
        {q:"Did I protect both accounts?",key:"protectedAccounts"},
        {q:"Did I record everything?",key:"recorded"},
        {q:"Did I review?",key:"reviewed"},
        {q:"Did I survive?",key:"survived"},
      ];
      const [checklist,setChecklist]=useState({followedRules:null,protectedAccounts:null,recorded:null,reviewed:null,survived:null});
      const gradeColors={A:"text-emerald-400",B:"text-blue-400",C:"text-yellow-400",F:"text-red-400"};
      return (
        <div className="border border-zinc-700 rounded-lg p-5 bg-zinc-950 mb-6">
          <div className="text-xs font-mono text-zinc-500 uppercase tracking-widest mb-4">Session Summary</div>
          <div className="grid grid-cols-4 gap-4 mb-4">
            {[
              {label:"NET P&L",   value:(totalPnL>=0?"+":"")+totalPnL.toFixed(0), color:totalPnL>=0?"text-emerald-400":"text-red-400"},
              {label:"WIN RATE",  value:winRate!==null?`${winRate}%`:"—",          color:"text-zinc-100"},
              {label:"AVG MAE (W)",value:winMAE!==null?winMAE:"—",                 color:"text-emerald-400"},
              {label:"AVG MAE (L)",value:lossMAE!==null?lossMAE:"—",              color:"text-red-400"},
            ].map(({label,value,color})=>(
              <div key={label} className="bg-zinc-900 rounded p-3 text-center">
                <div className="text-xs text-zinc-500 font-mono mb-1">{label}</div>
                <div className={`text-2xl font-mono font-bold ${color}`}>{value}</div>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-4 mb-4">
            <div className="bg-zinc-900 rounded p-3">
              <div className="text-xs text-zinc-500 font-mono mb-2">TRADE GRADES</div>
              <div className="flex gap-3">
                {["A","B","C","F"].map(g=>(
                  <div key={g} className="text-center">
                    <div className={`text-xl font-mono font-bold ${gradeColors[g]}`}>{gradeCounts[g]}</div>
                    <div className="text-xs text-zinc-500 font-mono">{g}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-zinc-900 rounded p-3">
              <div className="text-xs text-zinc-500 font-mono mb-2">FOLLOW THROUGH / NEGOTIABLE</div>
              <div className="flex gap-4 text-xs font-mono">
                <div><span className="text-emerald-400">{iftYes}</span> IFT Yes / <span className="text-red-400">{iftNo}</span> No</div>
                <div><span className="text-emerald-400">{negYes}</span> Neg Yes / <span className="text-red-400">{negNo}</span> No</div>
              </div>
            </div>
          </div>
          {Object.keys(lossTags).length>0&&(
            <div className="bg-zinc-900 rounded p-3 mb-4">
              <div className="text-xs text-zinc-500 font-mono mb-2">LOSS BREAKDOWN</div>
              <div className="flex flex-wrap gap-3">
                {Object.entries(lossTags).sort((a,b)=>b[1]-a[1]).map(([tag,count])=>(
                  <div key={tag} className="flex items-center gap-1">
                    <span className="text-red-400 font-mono font-bold text-sm">{count}</span>
                    <span className="text-zinc-400 font-mono text-xs">{tag}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="bg-zinc-900 rounded p-3">
            <div className="text-xs text-zinc-500 font-mono mb-3">POST-SESSION CHECKLIST</div>
            <div className="space-y-2">
              {fiveQ.map(({q,key})=>(
                <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span className="text-zinc-300 font-mono text-xs">{q}</span>
                  <YesNo value={checklist[key]} onChange={v=>setChecklist(prev=>({...prev,[key]:v}))}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function TradesAvoided({ avoided, setAvoided }) {
      const add    = () => setAvoided(prev=>[...prev,{id:Date.now()+Math.random(),setup:"",passed:null,outcome:""}]);
      const update = (id,key,val)=>setAvoided(prev=>prev.map(a=>a.id===id?{...a,[key]:val}:a));
      const remove = (id)=>setAvoided(prev=>prev.filter(a=>a.id!==id));
      return (
        <div className="border border-zinc-700 rounded-lg p-5 mb-6 bg-zinc-950">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
            <div>
              <div className="text-xs font-mono text-zinc-500 uppercase tracking-widest">Trades Avoided</div>
              <div className="text-xs text-zinc-600 italic mt-1">Every correctly avoided garbage setup = +1 point. This is a skill.</div>
            </div>
            <button onClick={add} className="chip-base" style={{fontSize:"11px"}}>+ ADD</button>
          </div>
          {avoided.length===0&&(
            <div className="text-zinc-700 font-mono text-xs text-center py-4">No avoided setups logged yet.</div>
          )}
          {avoided.map(a=>(
            <div key={a.id} className="border border-zinc-800 rounded p-3 mb-2 grid grid-cols-3 gap-3" style={{alignItems:"end"}}>
              <div>
                <div className="text-xs text-zinc-500 font-mono mb-1">Setup Seen</div>
                <Input value={a.setup}   onChange={v=>update(a.id,"setup",v)}   placeholder="Chop reversal" small/>
              </div>
              <div>
                <div className="text-xs text-zinc-500 font-mono mb-1">Passed?</div>
                <YesNo value={a.passed} onChange={v=>update(a.id,"passed",v)}/>
              </div>
              <div>
                <div className="text-xs text-zinc-500 font-mono mb-1">Outcome (if traded)</div>
                <Input value={a.outcome} onChange={v=>update(a.id,"outcome",v)} placeholder="Would've lost" small/>
              </div>
            </div>
          ))}
          {avoided.length>0&&(
            <div className="mt-2 text-right">
              <span className="font-mono text-emerald-400 text-sm font-bold">{avoided.filter(a=>a.passed===true).length}</span>
              <span className="font-mono text-zinc-500 text-xs"> setups correctly avoided</span>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════
    // DASHBOARD COMPONENTS
    // ════════════════════════════════════════════

    function Stat({ label, value, sub, color }) {
      return (
        <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:"14px 16px"}}>
          <div style={{...mono,color:C.muted,fontSize:9,letterSpacing:"0.15em",marginBottom:6}}>{label}</div>
          <div style={{...mono,color:color||C.text,fontSize:22,fontWeight:700}}>{value}</div>
          {sub&&<div style={{...mono,color:C.faint,fontSize:10,marginTop:4}}>{sub}</div>}
        </div>
      );
    }

    function SectionHead({ children }) {
      return <div style={{...mono,color:C.muted,fontSize:9,letterSpacing:"0.2em",marginBottom:12,marginTop:24}}>{children}</div>;
    }

    function MiniBar({ label, val, max, color }) {
      const pct = max>0?Math.min(100,(val/max)*100):0;
      return (
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{...mono,color:C.muted,fontSize:10}}>{label}</span>
            <span style={{...mono,color:C.text,fontSize:10,fontWeight:700}}>{val}</span>
          </div>
          <div style={{background:C.surface,borderRadius:2,height:4,width:"100%"}}>
            <div style={{background:color||C.blue,borderRadius:2,height:4,width:`${pct}%`,transition:"width .4s"}}/>
          </div>
        </div>
      );
    }

    const ChartTooltip = ({active,payload,label}) => {
      if(!active||!payload?.length) return null;
      return (
        <div style={{...mono,background:C.card,border:`1px solid ${C.border2}`,borderRadius:6,padding:"8px 12px",fontSize:11}}>
          <div style={{color:C.muted,marginBottom:4}}>{label}</div>
          {payload.map((p,i)=>(
            <div key={i} style={{color:p.value>=0?C.green:C.red}}>
              {p.name}: {p.value>=0?"+":""}{typeof p.value==="number"?p.value.toFixed(0):p.value}
            </div>
          ))}
        </div>
      );
    };

    function GrandSlams({ stats }) {
      const slams = [
        {label:"Trades Reviewed",        val:stats.totalTrades,         targets:[100,500,1000]},
        {label:"Sessions Logged",         val:stats.totalSessions,       targets:[30,100,250]},
        {label:"Consecutive Logged",      val:stats.currentStreak,       targets:[5,10,20,50]},
        {label:"Chop Avoided",            val:stats.totalAvoided,        targets:[20,50,100]},
        {label:"Correct Env Calls",       val:stats.correctEnvCalls,     targets:[10,30,75]},
        {label:"A-Grade Trades",          val:stats.aGrades,             targets:[25,100,250]},
        {label:"F-Grade Free Streak",     val:stats.freeStreak,          targets:[10,25,50]},
        {label:"Non-Expansion Sessions",  val:stats.nonExpansionSessions,targets:[10,30,60]},
      ];
      return (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {slams.map(s=>{
            const next = s.targets.find(t=>t>s.val)||s.targets[s.targets.length-1];
            const prev = s.targets[s.targets.indexOf(next)-1]||0;
            const pct  = next>prev?Math.min(100,((s.val-prev)/(next-prev))*100):100;
            const done = s.val>=next;
            return (
              <div key={s.label} style={{background:C.card,border:`1px solid ${done?C.green:C.border2}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{...mono,color:done?C.greenText:C.muted,fontSize:9,letterSpacing:"0.1em",marginBottom:4}}>{s.label}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:8}}>
                  <span style={{...mono,color:done?C.green:C.text,fontSize:18,fontWeight:700}}>{s.val}</span>
                  <span style={{...mono,color:C.faint,fontSize:10}}>/ {next}</span>
                </div>
                <div style={{background:C.surface,borderRadius:2,height:3}}>
                  <div style={{background:done?C.green:C.blue,height:3,borderRadius:2,width:`${pct}%`,transition:"width .5s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function Dashboard({ sessions }) {
      const [view, setView] = useState("overview");

      const allTrades = sessions.flatMap(s=>(s.trades||[]).map(t=>({...t,sessionDate:s.date,env:s.environment})));
      const withRes   = allTrades.filter(t=>t.result!==""&&!isNaN(parseFloat(t.result)));
      const winners   = withRes.filter(t=>parseFloat(t.result)>=0);
      const losers    = withRes.filter(t=>parseFloat(t.result)<0);
      const totalPnL  = withRes.reduce((s,t)=>s+parseFloat(t.result),0);
      const winRate   = withRes.length>0?(winners.length/withRes.length*100).toFixed(1):"—";
      const avgWin    = winners.length>0?(winners.reduce((s,t)=>s+parseFloat(t.result),0)/winners.length).toFixed(0):0;
      const avgLoss   = losers.length>0 ?(losers.reduce((s,t)=>s+parseFloat(t.result),0)/losers.length).toFixed(0):0;
      const winMAE    = winners.filter(t=>t.mae!=="").length>0
        ?(winners.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae),0)/winners.filter(t=>t.mae!=="").length).toFixed(1):"—";
      const lossMAE   = losers.filter(t=>t.mae!=="").length>0
        ?(losers.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae),0)/losers.filter(t=>t.mae!=="").length).toFixed(1):"—";

      const pnlCurve = withRes.map((t,i)=>({
        i:i+1,
        pnl:withRes.slice(0,i+1).reduce((s,x)=>s+parseFloat(x.result),0),
        date:t.sessionDate
      }));

      const byDate = {};
      withRes.forEach(t=>{byDate[t.sessionDate]=(byDate[t.sessionDate]||0)+parseFloat(t.result);});
      const dailyBars = Object.entries(byDate).sort().map(([date,pnl])=>({date:date.slice(5),pnl}));

      const lossTags = {};
      losers.forEach(t=>{if(t.lossTag)lossTags[t.lossTag]=(lossTags[t.lossTag]||0)+1;});
      const topLoss = Object.entries(lossTags).sort((a,b)=>b[1]-a[1]);

      const setupWR = {};
      withRes.forEach(t=>{
        if(!t.setupTag) return;
        if(!setupWR[t.setupTag]) setupWR[t.setupTag]={w:0,l:0};
        parseFloat(t.result)>=0?setupWR[t.setupTag].w++:setupWR[t.setupTag].l++;
      });

      const grades = {A:0,B:0,C:0,F:0};
      allTrades.forEach(t=>{if(t.grade)grades[t.grade]++;});

      const iftYes = allTrades.filter(t=>t.immediateFollowThrough===true).length;
      const iftNo  = allTrades.filter(t=>t.immediateFollowThrough===false).length;
      const negYes = allTrades.filter(t=>t.negotiable===true).length;
      const negNo  = allTrades.filter(t=>t.negotiable===false).length;

      const envPnL = {};
      sessions.forEach(s=>{
        if(!s.environment) return;
        const spnl=(s.trades||[]).filter(t=>t.result!==""&&!isNaN(parseFloat(t.result))).reduce((x,t)=>x+parseFloat(t.result),0);
        if(!envPnL[s.environment]) envPnL[s.environment]={pnl:0,count:0};
        envPnL[s.environment].pnl+=spnl;
        envPnL[s.environment].count++;
      });

      const totalAvoided = sessions.reduce((s,x)=>(x.avoided||[]).filter(a=>a.passed===true).length+s,0);
      const correctEnvCalls = sessions.filter(s=>s.environmentCorrect===true).length;

      let freeStreak=0;
      for(let i=allTrades.length-1;i>=0;i--){
        if(allTrades[i].grade==="F") break;
        if(allTrades[i].grade) freeStreak++;
      }

      const nonExpansionSessions = sessions.filter(s=>s.environment&&s.environment!=="EXPANSION"&&s.environment!=="CHOP").length;
      const aGrades = grades.A;
      const gStats = {totalTrades:allTrades.length,totalSessions:sessions.length,currentStreak:sessions.length,
        totalAvoided,correctEnvCalls,aGrades,freeStreak,nonExpansionSessions};

      const TAB = (id,label) => (
        <button onClick={()=>setView(id)}
          className={`nav-tab ${view===id?"active":""}`}
          style={{letterSpacing:"0.1em"}}>{label}</button>
      );

      if(sessions.length===0) {
        return (
          <div style={{...mono,display:"flex",alignItems:"center",justifyContent:"center",
            flexDirection:"column",gap:12,padding:"80px 20px",color:C.muted,fontSize:12}}>
            <div>No sessions saved yet.</div>
            <div style={{color:C.faint,fontSize:10}}>Complete a session in the Logger tab and hit Save Session.</div>
          </div>
        );
      }

      return (
        <div style={{...mono,color:C.text}}>
          {/* Dashboard sub-tabs */}
          <div style={{borderBottom:`1px solid ${C.border}`,display:"flex",paddingLeft:4}}>
            {TAB("overview","OVERVIEW")}
            {TAB("slams","GRAND SLAMS")}
            {TAB("trades","TRADE BREAKDOWN")}
            {TAB("sessions","SESSION LOG")}
          </div>

          <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>

            {/* Total PnL badge */}
            <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:6,marginBottom:8}}>
              <span style={{color:totalPnL>=0?C.green:C.red,fontSize:18,fontWeight:700}}>
                {totalPnL>=0?"+":""}{totalPnL.toFixed(0)}</span>
              <span style={{color:C.muted,fontSize:10}}>all-time total</span>
            </div>

            {/* ── OVERVIEW ── */}
            {view==="overview"&&<>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
                <Stat label="NET P&L ($)" value={`${totalPnL>=0?"+":""}${totalPnL.toFixed(0)}`}
                  color={totalPnL>=0?C.green:C.red} sub={`${sessions.length} sessions`}/>
                <Stat label="WIN RATE" value={`${winRate}%`} sub={`${winners.length}W / ${losers.length}L`}
                  color={parseFloat(winRate)>=55?C.green:parseFloat(winRate)>=45?C.yellow:C.red}/>
                <Stat label="AVG WIN / LOSS" value={`+${avgWin}`} sub={`avg loss ${avgLoss}`} color={C.green}/>
                <Stat label="TRADES REVIEWED" value={allTrades.length} sub={`${totalAvoided} avoided`} color={C.blue}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24}}>
                <Stat label="MAE WINNERS (pts)" value={winMAE} color={C.green} sub="avg adverse excursion"/>
                <Stat label="MAE LOSERS (pts)"  value={lossMAE} color={C.red}  sub="avg adverse excursion"/>
                <Stat label="IFT YES / NO"       value={`${iftYes} / ${iftNo}`} sub="immediate followthrough"/>
                <Stat label="NEGOTIABLE Y / N"   value={`${negYes} / ${negNo}`} sub="market gave time"/>
              </div>

              <SectionHead>CUMULATIVE P&amp;L</SectionHead>
              {pnlCurve.length>0&&(
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:"16px 8px",marginBottom:20}}>
                  <ResponsiveContainer width="100%" height={180}>
                    <LineChart data={pnlCurve}>
                      <XAxis dataKey="i" tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                      <ReferenceLine y={0} stroke={C.border2} strokeDasharray="3 3"/>
                      <Tooltip content={<ChartTooltip/>}/>
                      <Line type="monotone" dataKey="pnl" name="Cumulative" stroke={C.blue} strokeWidth={2} dot={false}/>
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              )}

              <SectionHead>DAILY P&amp;L</SectionHead>
              {dailyBars.length>0&&(
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:"16px 8px",marginBottom:20}}>
                  <ResponsiveContainer width="100%" height={140}>
                    <BarChart data={dailyBars}>
                      <XAxis dataKey="date" tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
                      <ReferenceLine y={0} stroke={C.border2}/>
                      <Tooltip content={<ChartTooltip/>}/>
                      <Bar dataKey="pnl" name="P&L" radius={[2,2,0,0]}>
                        {dailyBars.map((d,i)=><Cell key={i} fill={d.pnl>=0?C.green:C.red}/>)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              )}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:16}}>
                  <SectionHead>TRADE GRADES</SectionHead>
                  {[["A",C.green],["B",C.blue],["C",C.yellow],["F",C.red]].map(([g,c])=>(
                    <MiniBar key={g} label={g} val={grades[g]} max={Math.max(...Object.values(grades),1)} color={c}/>
                  ))}
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:16}}>
                  <SectionHead>P&amp;L BY ENVIRONMENT</SectionHead>
                  {Object.entries(envPnL).sort((a,b)=>b[1].pnl-a[1].pnl).map(([env,{pnl,count}])=>(
                    <div key={env} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{color:C.muted,fontSize:10}}>{env}</span>
                      <div style={{textAlign:"right"}}>
                        <span style={{color:pnl>=0?C.green:C.red,fontSize:11,fontWeight:700}}>{pnl>=0?"+":""}{pnl.toFixed(0)}</span>
                        <span style={{color:C.faint,fontSize:9,marginLeft:6}}>({count} sessions)</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {topLoss.length>0&&<>
                <SectionHead>LOSS BREAKDOWN — YOUR ENEMY</SectionHead>
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:16,marginBottom:20}}>
                  {topLoss.map(([tag,count])=>(
                    <MiniBar key={tag} label={tag} val={count} max={topLoss[0][1]} color={C.red}/>
                  ))}
                </div>
              </>}

              {Object.keys(setupWR).length>0&&<>
                <SectionHead>WIN RATE BY SETUP</SectionHead>
                <div style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:16}}>
                  {Object.entries(setupWR).map(([tag,{w,l}])=>{
                    const wr=(w/(w+l)*100).toFixed(0);
                    return (
                      <div key={tag} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <span style={{color:C.muted,fontSize:10}}>{tag}</span>
                        <div>
                          <span style={{color:parseInt(wr)>=55?C.green:parseInt(wr)>=45?C.yellow:C.red,fontSize:11,fontWeight:700}}>{wr}%</span>
                          <span style={{color:C.faint,fontSize:9,marginLeft:6}}>{w}W {l}L</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>}
            </>}

            {/* ── GRAND SLAMS ── */}
            {view==="slams"&&<>
              <div style={{borderLeft:`2px solid ${C.faint}`,paddingLeft:14,marginBottom:20}}>
                <div style={{color:C.faint,fontSize:11,fontStyle:"italic",lineHeight:1.9}}>
                  You do not become dominant because you string together 100 green days.<br/>
                  You become dominant because you become so difficult to knock off course<br/>
                  that 100 green days eventually emerge from the process.
                </div>
              </div>
              <GrandSlams stats={gStats}/>
            </>}

            {/* ── TRADE BREAKDOWN ── */}
            {view==="trades"&&<>
              <div style={{overflowX:"auto"}}>
                <table style={{...mono,width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead>
                    <tr style={{borderBottom:`1px solid ${C.border2}`}}>
                      {["Date","Dir","Result","MAE","MFE","Grade","IFT","Neg","Setup","Loss Tag","Why"].map(h=>(
                        <th key={h} style={{color:C.muted,padding:"8px 10px",textAlign:"left",fontWeight:400,fontSize:9,letterSpacing:"0.1em"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {allTrades.map((t,i)=>{
                      const res=parseFloat(t.result);
                      return (
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
                          <td style={{padding:"7px 10px",color:C.muted}}>{t.sessionDate}</td>
                          <td style={{padding:"7px 10px",color:t.direction==="LONG"?C.green:t.direction==="SHORT"?C.red:C.muted}}>{t.direction||"—"}</td>
                          <td style={{padding:"7px 10px",color:isNaN(res)?C.muted:res>=0?C.green:C.red,fontWeight:700}}>{isNaN(res)?t.result:`${res>=0?"+":""}${res}`}</td>
                          <td style={{padding:"7px 10px",color:C.yellow}}>{t.mae||"—"}</td>
                          <td style={{padding:"7px 10px",color:C.muted}}>{t.mfe||"—"}</td>
                          <td style={{padding:"7px 10px",color:t.grade==="A"?C.green:t.grade==="B"?C.blue:t.grade==="C"?C.yellow:t.grade==="F"?C.red:C.muted,fontWeight:700}}>{t.grade||"—"}</td>
                          <td style={{padding:"7px 10px",color:t.immediateFollowThrough===true?C.green:t.immediateFollowThrough===false?C.red:C.faint}}>{t.immediateFollowThrough===true?"Y":t.immediateFollowThrough===false?"N":"—"}</td>
                          <td style={{padding:"7px 10px",color:t.negotiable===true?C.green:t.negotiable===false?C.red:C.faint}}>{t.negotiable===true?"Y":t.negotiable===false?"N":"—"}</td>
                          <td style={{padding:"7px 10px",color:C.muted}}>{t.setupTag||"—"}</td>
                          <td style={{padding:"7px 10px",color:C.red}}>{t.lossTag||"—"}</td>
                          <td style={{padding:"7px 10px",color:C.muted,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.why||"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </>}

            {/* ── SESSION LOG ── */}
            {view==="sessions"&&<>
              {[...sessions].reverse().map(s=>{
                const st=s.trades||[];
                const wr=st.filter(t=>!isNaN(parseFloat(t.result)));
                const spnl=wr.reduce((x,t)=>x+parseFloat(t.result),0);
                const wins=wr.filter(t=>parseFloat(t.result)>=0).length;
                return (
                  <div key={s.id} style={{background:C.card,border:`1px solid ${C.border2}`,borderRadius:8,padding:"14px 16px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div>
                        <span style={{color:C.text,fontSize:13,fontWeight:700}}>{s.date}</span>
                        <span style={{color:C.muted,fontSize:10,marginLeft:10}}>{s.environment||"—"}</span>
                      </div>
                      <div style={{display:"flex",gap:16,alignItems:"center"}}>
                        <span style={{color:spnl>=0?C.green:C.red,fontSize:13,fontWeight:700}}>{spnl>=0?"+":""}{spnl.toFixed(0)}</span>
                        <span style={{color:C.muted,fontSize:10}}>{wins}W/{wr.length-wins}L</span>
                        <span style={{color:s.survived?C.green:C.faint,fontSize:10}}>{s.survived?"✓ SURVIVED":"—"}</span>
                      </div>
                    </div>
                    {s.sessionNotes&&<div style={{color:C.muted,fontSize:10,fontStyle:"italic"}}>{s.sessionNotes}</div>}
                  </div>
                );
              })}
            </>}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    // SESSION LOGGER VIEW
    // ════════════════════════════════════════════

    function SessionLogger({ onSave }) {
      const [session,  setSession]  = useState(emptySession());
      const [avoided,  setAvoided]  = useState([]);
      const [view,     setView]     = useState("session"); // session | summary
      const [saved,    setSaved]    = useState(false);

      const updateSession = (key,val) => setSession(prev=>({...prev,[key]:val}));
      const addTrade      = () => setSession(prev=>({...prev,trades:[...prev.trades,emptyTrade()]}));
      const updateTrade   = (id,upd) => setSession(prev=>({...prev,trades:prev.trades.map(t=>t.id===id?upd:t)}));
      const removeTrade   = (id) => setSession(prev=>({...prev,trades:prev.trades.filter(t=>t.id!==id)}));

      const resetSession = () => {
        if(window.confirm("Start a new session? Current data will be cleared.")) {
          setSession(emptySession());
          setAvoided([]);
          setView("session");
          setSaved(false);
        }
      };

      const handleSave = () => {
        const full = {...session, avoided, id: session.id||Date.now()+Math.random()};
        onSave(full);
        setSaved(true);
        setTimeout(()=>setSaved(false),2500);
      };

      const hdrBtn = {
        background:"none", border:"1px solid #3f3f46", color:"#a1a1aa",
        padding:"6px 14px", borderRadius:"4px", fontSize:"11px", cursor:"pointer",
        fontFamily:"inherit",
      };
      const envBtn = (active) => ({
        padding:"6px 14px", border:`1px solid ${active?"#6366f1":"#3f3f46"}`,
        borderRadius:"4px", background:active?"#1e1b4b":"#18181b",
        color:active?"#a5b4fc":"#71717a", fontSize:"11px", cursor:"pointer", fontFamily:"inherit",
      });
      const yesNoBtn = (active,isYes) => ({
        padding:"6px 16px", border:`1px solid ${active?(isYes?"#10b981":"#ef4444"):"#3f3f46"}`,
        borderRadius:"4px", background:active?(isYes?"#064e3b":"#450a0a"):"#18181b",
        color:active?(isYes?"#6ee7b7":"#fca5a5"):"#71717a", fontSize:"11px", cursor:"pointer", fontFamily:"inherit",
      });
      const envCorrectBtn = (val,active) => ({
        padding:"6px 16px",
        border:`1px solid ${active?(val===true?"#10b981":val===false?"#ef4444":"#6366f1"):"#3f3f46"}`,
        borderRadius:"4px",
        background:active?(val===true?"#064e3b":val===false?"#450a0a":"#1e1b4b"):"#18181b",
        color:active?(val===true?"#6ee7b7":val===false?"#fca5a5":"#a5b4fc"):"#71717a",
        fontSize:"11px", cursor:"pointer", fontFamily:"inherit",
      });

      return (
        <div style={{background:"#0a0a0a",minHeight:"100vh",fontFamily:"'JetBrains Mono','Courier New',monospace"}}>
          {/* Inner header */}
          <div style={{borderBottom:"1px solid #27272a",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#09090b"}}>
            <div style={{color:"#71717a",fontSize:"10px",letterSpacing:"0.15em"}}>SESSION LOGGER</div>
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              <button id="print-btn" onClick={()=>window.print()} style={{...hdrBtn,borderColor:"#6366f1",color:"#a5b4fc"}}>⬇ PRINT / SAVE PDF</button>
              <button onClick={()=>setView(view==="session"?"summary":"session")} style={hdrBtn}>
                {view==="session"?"VIEW SUMMARY":"VIEW SESSION"}</button>
              <button onClick={handleSave} style={{...hdrBtn,borderColor:saved?"#10b981":"#eab308",color:saved?"#6ee7b7":"#fde047",fontWeight:700}}>
                {saved?"✓ SAVED":"SAVE SESSION"}</button>
              <button onClick={resetSession} style={{...hdrBtn,color:"#71717a"}}>NEW SESSION</button>
            </div>
          </div>

          <div style={{maxWidth:"860px",margin:"0 auto",padding:"24px 16px"}}>
            {/* Mantra */}
            <div style={{borderLeft:"2px solid #3f3f46",paddingLeft:"16px",marginBottom:"28px"}}>
              <div style={{color:"#52525b",fontSize:"11px",fontStyle:"italic",lineHeight:"1.8"}}>
                I protect the account. I stack clean days. I become impossible to kill.<br/>
                Has the market earned my participation?
              </div>
            </div>

            {/* PRE-SESSION */}
            <div style={{border:"1px solid #3f3f46",borderRadius:"8px",padding:"20px",marginBottom:"20px",background:"#09090b"}}>
              <div style={{color:"#71717a",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"16px"}}>PRE-SESSION</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
                <div>
                  <div style={{color:"#71717a",fontSize:"10px",marginBottom:"6px"}}>DATE</div>
                  <input type="date" value={session.date} onChange={e=>updateSession("date",e.target.value)} className="field-input"/>
                </div>
                <div>
                  <div style={{color:"#71717a",fontSize:"10px",marginBottom:"6px"}}>FIRST TRADE FOLLOWED SETUP?</div>
                  <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
                    {[true,false].map(v=>(
                      <button key={String(v)} onClick={()=>updateSession("firstTradeSetup",session.firstTradeSetup===v?null:v)}
                        style={yesNoBtn(session.firstTradeSetup===v,v)}>{v?"YES":"NO"}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{marginBottom:"12px"}}>
                <div style={{color:"#71717a",fontSize:"10px",marginBottom:"6px"}}>MARKET ENVIRONMENT — Classify before first trade</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                  {ENV_OPTIONS.map(e=>(
                    <button key={e} onClick={()=>updateSession("environment",session.environment===e?"":e)} style={envBtn(session.environment===e)}>{e}</button>
                  ))}
                </div>
                <div style={{color:"#52525b",fontSize:"10px",marginTop:"6px",fontStyle:"italic"}}>
                  ROTATIONAL = levels respected, discretion works · CHOP = whipsaws, avoid · EXPANSION = violent, fast, kills discretion
                </div>
              </div>
            </div>

            {view==="summary"?(
              <SummaryPanel session={session}/>
            ):(
              <>
                <div style={{marginBottom:"8px",color:"#71717a",fontSize:"10px",letterSpacing:"0.2em"}}>TRADE LOG</div>
                {session.trades.map((trade,i)=>(
                  <TradeCard key={trade.id} trade={trade} index={i}
                    onChange={upd=>updateTrade(trade.id,upd)}
                    onRemove={()=>removeTrade(trade.id)}/>
                ))}
                <button onClick={addTrade}
                  style={{width:"100%",background:"none",border:"1px dashed #3f3f46",color:"#52525b",
                    padding:"12px",borderRadius:"8px",fontSize:"11px",cursor:"pointer",marginBottom:"20px",fontFamily:"inherit"}}>
                  + ADD TRADE
                </button>
                <TradesAvoided avoided={avoided} setAvoided={setAvoided}/>

                {/* Session Metrics */}
                <div style={{border:"1px solid #3f3f46",borderRadius:"8px",padding:"20px",marginBottom:"20px",background:"#09090b"}}>
                  <div style={{color:"#71717a",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"16px"}}>SESSION METRICS</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"16px"}}>
                    {[
                      {key:"reentryCount",   label:"Re-entry Count",         hint:"Times re-entered after stop"},
                      {key:"walkAways",      label:"Conscious Walk-Aways",   hint:"Times passed on a setup"},
                      {key:"patienceScore",  label:"Patience Score (1–5)",   hint:"1=clicked fast, 5=fully let market prove"},
                    ].map(({key,label,hint})=>(
                      <div key={key}>
                        <div style={{color:"#71717a",fontSize:"10px",marginBottom:"2px"}}>{label}</div>
                        <div style={{color:"#52525b",fontSize:"9px",marginBottom:"6px",fontStyle:"italic"}}>{hint}</div>
                        <input value={session[key]} onChange={e=>updateSession(key,e.target.value)} className="field-input"/>
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:"12px"}}>
                    <div style={{color:"#71717a",fontSize:"10px",marginBottom:"6px"}}>WAS ENVIRONMENT CALL CORRECT?</div>
                    <div style={{display:"flex",gap:"8px"}}>
                      {[true,false,"unknown"].map(v=>(
                        <button key={String(v)}
                          onClick={()=>updateSession("environmentCorrect",session.environmentCorrect===v?null:v)}
                          style={envCorrectBtn(v,session.environmentCorrect===v)}>
                          {v===true?"YES":v===false?"NO":"UNKNOWN"}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{color:"#71717a",fontSize:"10px",marginBottom:"6px"}}>SESSION NOTES / LESSON</div>
                    <textarea value={session.sessionNotes} onChange={e=>updateSession("sessionNotes",e.target.value)}
                      rows={3} placeholder="What did the session teach you? One key takeaway." className="field-input"/>
                  </div>
                </div>

                {/* Post-session */}
                <div style={{border:"1px solid #3f3f46",borderRadius:"8px",padding:"20px",background:"#09090b"}}>
                  <div style={{color:"#71717a",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"12px"}}>POST-SESSION — DAILY CHECK</div>
                  <SummaryPanel session={session}/>
                </div>
              </>
            )}

            <div style={{marginTop:"24px",color:"#3f3f46",fontSize:"10px",textAlign:"center",fontStyle:"italic"}}>
              The account staying open is the win condition. Profit is the bonus.
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    // ROOT APP
    // ════════════════════════════════════════════

    function App() {
      const [tab,      setTab]      = useState("logger"); // logger | dashboard
      const [sessions, setSessions] = useState(null);

      useEffect(()=>{ loadSessions().then(setSessions); },[]);

      const handleSave = (newSession) => {
        setSessions(prev => {
          const existing = prev||[];
          const idx = existing.findIndex(s=>s.id===newSession.id);
          const updated = idx>=0
            ? existing.map((s,i)=>i===idx?newSession:s)
            : [...existing, newSession];
          saveSessions(updated);
          return updated;
        });
      };

      if(sessions===null) {
        return (
          <div style={{...mono,background:"#08080a",minHeight:"100vh",display:"flex",
            alignItems:"center",justifyContent:"center",color:"#71717a",fontSize:12}}>
            Loading…
          </div>
        );
      }

      return (
        <div style={{...mono,background:"#08080a",minHeight:"100vh"}}>
          {/* ── Top Header ── */}
          <div style={{background:"#050505",borderBottom:"4px solid #eab308",padding:"14px 24px",
            display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:30}}>
            <div>
              <div style={{color:"#eab308",fontSize:"9px",letterSpacing:"0.25em",fontWeight:900,marginBottom:2}}>KAIZEN TRADE AUTOPSY</div>
              <div style={{color:"#e4e4e7",fontSize:"18px",fontWeight:700,letterSpacing:"0.05em"}}>
                {tab==="logger"?"SESSION LOG":"PERFORMANCE DASHBOARD"}
              </div>
            </div>
            <div style={{display:"flex",gap:0,border:"1px solid #3f3f46",borderRadius:6,overflow:"hidden"}}>
              <button
                onClick={()=>setTab("logger")}
                style={{padding:"8px 20px",background:tab==="logger"?"#eab308":"transparent",
                  color:tab==="logger"?"#050505":"#71717a",border:"none",fontSize:"11px",
                  fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.1em",
                  borderRight:"1px solid #3f3f46",transition:"all .15s"}}>
                LOGGER
              </button>
              <button
                onClick={()=>setTab("dashboard")}
                style={{padding:"8px 20px",background:tab==="dashboard"?"#6366f1":"transparent",
                  color:tab==="dashboard"?"#fff":"#71717a",border:"none",fontSize:"11px",
                  fontWeight:700,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.1em",transition:"all .15s"}}>
                DASHBOARD {sessions.length>0&&<span style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"1px 6px",fontSize:9,marginLeft:4}}>{sessions.length}</span>}
              </button>
            </div>
          </div>

          {/* ── Views ── */}
          {tab==="logger" && <SessionLogger onSave={handleSave}/>}
          {tab==="dashboard" && <Dashboard sessions={sessions}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
