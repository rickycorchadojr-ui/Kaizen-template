<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Core Suite — Pro Terminal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        
        :root {
            --ink: #0a0a0a;
            --ink2: #2a2a2a;
            --ink3: #555;
            --rule: #c8c8c8;
            --rule2: #e0e0e0;
            --bg: #ffffff;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #08080a;
            color: #e4e4e7;
        }

        /* Pure CSS Custom Scrollbars for Terminal Feel */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f12; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Print Autopsy View Layout Context Rules */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .print-page {
                width: 8.5in;
                min-height: 11in;
                margin: 0 auto !important;
                padding: 0.55in 0.6in !important;
                background: white !important;
                color: var(--ink) !important;
                page-break-after: always;
            }
            .print-page:last-child { page-break-after: avoid; }
            .print-box { border: 0.5pt solid var(--rule) !important; color: var(--ink) !important; }
            .print-rule { border-bottom: 0.5pt solid var(--rule) !important; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine, Cell } = Recharts;

        const SESSIONS_KEY = "kaizen:sessions";

        // Global Structural Constants
        const ENV_OPTIONS = ["ROTATIONAL", "TRENDING", "CHOP", "EXPANSION", "UNKNOWN"];
        const GRADE_OPTIONS = ["A", "B", "C", "F"];
        const SETUP_TAGS = ["BREAKOUT", "PULLBACK", "REVERSAL", "CONTINUATION", "OPENING RANGE", "FAILED AUCTION", "ANTICIPATION", "FOMO", "CHASE", "OTHER"];
        const LOSS_TAGS = ["EARLY", "CHOP", "REVERSAL", "CHASE", "OVERSIZED", "FOMO", "LOW VOLUME", "COUNTERTREND", "OPENING RANGE NOISE", "EXPANSION"];

        // State Instantiation Initializers
        const emptyTrade = () => ({
            id: Date.now() + Math.random(),
            direction: "", time: "", entry: "", exit: "", result: "", grade: "",
            immediateFollowThrough: null, negotiable: null, mae: "", mfe: "", why: "",
            wouldTakeAgain: null, marketDid: null, lossTag: "", setupTag: "", contracts: "", notes: ""
        });

        const emptySession = () => ({
            id: Date.now(),
            date: new Date().toISOString().slice(0, 10),
            sessionNum: "", environment: "", environmentCorrect: null, firstTradeSetup: null,
            cheatScore: "", patienceScore: "", walkAways: "", reentryCount: "", sessionNotes: "",
            trades: [emptyTrade()], avoided: [], survived: true
        });

        const C = {
            bg: "#08080a", surface: "#0f0f12", card: "#141417", border: "#27272a", border2: "#3f3f46",
            text: "#e4e4e7", muted: "#71717a", faint: "#3f3f46", green: "#10b981", greenBg: "#064e3b",
            greenText: "#6ee7b7", red: "#ef4444", redBg: "#450a0a", redText: "#fca5a5", blue: "#6366f1",
            blueBg: "#1e1b4b", blueText: "#a5b4fc", yellow: "#eab308", yellowBg: "#422006", yellowText: "#fde047"
        };

        // UI Core Atomic Elements
        function Chip({ label, active, onClick, color = "blue" }) {
            const colors = {
                blue: active ? "bg-blue-900 text-blue-100 border-blue-500" : "bg-zinc-900 text-zinc-400 border-zinc-700 hover:border-zinc-500",
                red: active ? "bg-red-900 text-red-100 border-red-500" : "bg-zinc-900 text-zinc-400 border-zinc-700 hover:border-zinc-500",
                green: active ? "bg-emerald-900 text-emerald-100 border-emerald-500" : "bg-zinc-900 text-zinc-400 border-zinc-700 hover:border-zinc-500",
                yellow: active ? "bg-yellow-900 text-yellow-100 border-yellow-500" : "bg-zinc-900 text-zinc-400 border-zinc-700 hover:border-zinc-500"
            };
            return (
                <button type="button" onClick={onClick} className={`px-2.5 py-1 text-xs font-mono border rounded transition-all ${colors[color]}`}>
                    {label}
                </button>
            );
        }

        function YesNo({ value, onChange }) {
            return (
                <div className="flex gap-2">
                    <Chip label="YES" active={value === true} onClick={() => onChange(value === true ? null : true)} color="green" />
                    <Chip label="NO" active={value === false} onClick={() => onChange(value === false ? null : false)} color="red" />
                </div>
            );
        }

        function Field({ label, hint, children }) {
            return (
                <div className="mb-4">
                    <div className="text-xs font-mono text-zinc-400 uppercase tracking-widest mb-1">{label}</div>
                    {hint && <div className="text-[11px] text-zinc-600 mb-1.5 italic">{hint}</div>}
                    {children}
                </div>
            );
        }

        // --- MASTER APPLICATION ---
        function App() {
            const [activeTab, setActiveTab] = useState("logger");
            const [sessions, setSessions] = useState([]);
            const [currentSession, setCurrentSession] = useState(emptySession());

            const loadAllData = () => {
                try {
                    const saved = localStorage.getItem(SESSIONS_KEY);
                    if (saved) setSessions(JSON.parse(saved));
                } catch (e) { console.error("Could not fetch sessions store.", e); }
            };

            useEffect(() => {
                loadAllData();
            }, [activeTab]);

            const handleSave = (sessionToSave) => {
                const updated = [...sessions.filter(s => s.id !== sessionToSave.id), sessionToSave];
                localStorage.setItem(SESSIONS_KEY, JSON.stringify(updated));
                setSessions(updated);
                alert("Session metrics securely pinned to localStorage database array.");
            };

            const handleLoadToLogger = (session) => {
                setCurrentSession(session);
                setActiveTab("logger");
            };

            return (
                <div className="min-h-screen flex flex-col bg-[#08080a]">
                    {/* Persistent Global Application Control Matrix */}
                    <header className="no-print bg-[#0f0f12] border-b border-zinc-800 sticky top-0 z-50 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="h-2 w-2 rounded-full bg-indigo-500 animate-pulse"></div>
                            <span className="font-bold tracking-wider text-sm font-mono text-white">KAIZEN TRADING CORE OPERATING SUITE</span>
                        </div>
                        <nav className="flex gap-2">
                            <button onClick={() => setActiveTab("logger")} className={`px-4 py-2 font-mono text-xs border rounded transition ${activeTab === 'logger' ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-zinc-900 text-zinc-400 border-zinc-700'}`}>
                                📝 LOGGER TERMINAL
                            </button>
                            <button onClick={() => setActiveTab("dashboard")} className={`px-4 py-2 font-mono text-xs border rounded transition ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-zinc-900 text-zinc-400 border-zinc-700'}`}>
                                📊 METRICS & PROGRESSION
                            </button>
                            <button onClick={() => setActiveTab("autopsy")} className={`px-4 py-2 font-mono text-xs border rounded transition ${activeTab === 'autopsy' ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-zinc-900 text-zinc-400 border-zinc-700'}`}>
                                🖨️ PRINT SHEET AUTOPSY
                            </button>
                        </nav>
                    </header>

                    <main className={`flex-grow ${activeTab === 'autopsy' ? 'p-0 bg-white' : 'p-6'}`}>
                        {activeTab === "logger" && (
                            <LoggerView session={currentSession} setSession={setCurrentSession} onSave={handleSave} />
                        )}
                        {activeTab === "dashboard" && (
                            <DashboardView sessions={sessions} onLoadSession={handleLoadToLogger} />
                        )}
                        {activeTab === "autopsy" && (
                            <AutopsyPrintView session={currentSession} />
                        )}
                    </main>
                </div>
            );
        }

        // --- VIEW 1: LOGGER TERMINAL MODULE ---
        function LoggerView({ session, setSession, onSave }) {
            const updateSession = (k, v) => setSession({ ...session, [k]: v });
            
            const updateTrade = (id, k, v) => {
                setSession({
                    ...session,
                    trades: session.trades.map(t => t.id === id ? { ...t, [k]: v } : t)
                });
            };

            const addTradeRow = () => {
                setSession({ ...session, trades: [...session.trades, emptyTrade()] });
            };

            const removeTradeRow = (id) => {
                if (session.trades.length === 1) return;
                setSession({ ...session, trades: session.trades.filter(t => t.id !== id) });
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6">
                    {/* Pre-Session Setup Box */}
                    <div className="bg-zinc-950 border border-zinc-800 rounded-lg p-6">
                        <div className="text-xs font-bold tracking-widest text-indigo-400 mb-4 uppercase font-mono">PRE-SESSION DISCIPLINE CONTEXT</div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <Field label="Session Calendar Date">
                                <input type="date" value={session.date} onChange={e => updateSession("date", e.target.value)} className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none focus:border-zinc-500" />
                            </Field>
                            <Field label="Session Custom ID / Number">
                                <input type="text" value={session.sessionNum || ""} onChange={e => updateSession("sessionNum", e.target.value)} placeholder="e.g. 104" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none focus:border-zinc-500" />
                            </Field>
                            <Field label="First Trade Followed Setup Rule?">
                                <YesNo value={session.firstTradeSetup} onChange={v => updateSession("firstTradeSetup", v)} />
                            </Field>
                        </div>
                        <div className="mt-4">
                            <Field label="Pre-Classified Market Environment Pattern" hint="ROTATIONAL = levels respected · TRENDING = clean direction · CHOP = whipsaws · EXPANSION = violent, kills choice · UNKNOWN = watch longer">
                                <div className="flex flex-wrap gap-2 mt-1">
                                    {ENV_OPTIONS.map(env => (
                                        <Chip key={env} label={env} active={session.environment === env} onClick={() => updateSession("environment", env)} color="blue" />
                                    ))}
                                </div>
                            </Field>
                        </div>
                    </div>

                    {/* Trades Logging Block Array */}
                    <div className="space-y-4">
                        <div className="text-xs font-bold tracking-widest text-indigo-400 uppercase font-mono px-1">ACTIVE SYSTEM ACTION LOGS</div>
                        {session.trades.map((trade, idx) => {
                            const resultNum = parseFloat(trade.result);
                            return (
                                <div key={trade.id} className="bg-zinc-950 border border-zinc-800 rounded-lg p-6 space-y-4 relative">
                                    <div className="flex justify-between items-center border-b border-zinc-800 pb-3">
                                        <div className="flex items-center gap-4">
                                            <span className="font-bold font-mono text-sm text-zinc-400">TRADE MATCH POSITION</span>
                                            <span className="text-xl font-bold font-mono text-white bg-zinc-900 px-2.5 py-0.5 rounded border border-zinc-700">#{idx + 1}</span>
                                            {!isNaN(resultNum) && (
                                                <span className={`font-mono text-base font-bold px-2 py-0.5 rounded ${resultNum >= 0 ? 'bg-emerald-950/50 text-emerald-400' : 'bg-red-950/50 text-red-400'}`}>
                                                    {resultNum >= 0 ? "+" : ""}${resultNum.toFixed(2)}
                                                </span>
                                            )}
                                        </div>
                                        {session.trades.length > 1 && (
                                            <button type="button" onClick={() => removeTradeRow(trade.id)} className="text-xs text-red-400 font-mono border border-red-900/40 hover:bg-red-950/40 px-2.5 py-1 rounded transition">
                                                ELIMINATE LOG ENTRY
                                            </button>
                                        )}
                                    </div>

                                    {/* Primary Core Fields */}
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                                        <Field label="Execution Time"><input type="text" value={trade.time} onChange={e => updateTrade(trade.id, "time", e.target.value)} placeholder="09:42" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" /></Field>
                                        <Field label="Entry Handle"><input type="text" value={trade.entry} onChange={e => updateTrade(trade.id, "entry", e.target.value)} placeholder="5422.25" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" /></Field>
                                        <Field label="Terminal Exit"><input type="text" value={trade.exit} onChange={e => updateTrade(trade.id, "exit", e.target.value)} placeholder="5430.50" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" /></Field>
                                        <Field label="Net Return ($)"><input type="text" value={trade.result} onChange={e => updateTrade(trade.id, "result", e.target.value)} placeholder="-120.00" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" /></Field>
                                        <Field label="Size / Units"><input type="text" value={trade.contracts || ""} onChange={e => updateTrade(trade.id, "contracts", e.target.value)} placeholder="2" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" /></Field>
                                    </div>

                                    {/* Excursion Context Matrices */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <Field label="MAE Excursion (pts)" hint="Tier 1 Max Adverse Excursion against you.">
                                            <input type="text" value={trade.mae} onChange={e => updateTrade(trade.id, "mae", e.target.value)} placeholder="3.5" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" />
                                        </Field>
                                        <Field label="MFE Excursion (pts)" hint="Max Favorable Excursion path peak.">
                                            <input type="text" value={trade.mfe} onChange={e => updateTrade(trade.id, "mfe", e.target.value)} placeholder="11.25" className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none" />
                                        </Field>
                                        <Field label="Immediate Follow Through?">
                                            <YesNo value={trade.immediateFollowThrough} onChange={v => updateTrade(trade.id, "immediateFollowThrough", v)} />
                                        </Field>
                                        <Field label="Discretion Negotiable?">
                                            <YesNo value={trade.negotiable} onChange={v => updateTrade(trade.id, "negotiable", v)} />
                                        </Field>
                                    </div>

                                    {/* Qualitative Fields */}
                                    <Field label="Single Sentence Entry Thesis Strategy Core Reason">
                                        <input type="text" value={trade.why} onChange={e => updateTrade(trade.id, "why", e.target.value)} placeholder="Failed auction configuration setting at yesterday evening high mark level structure..." className="bg-zinc-900 border border-zinc-700 text-white text-xs font-mono rounded p-2 w-full outline-none focus:border-zinc-500" />
                                    </Field>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <Field label="Did Market Follow Intended Forecast?">
                                            <YesNo value={trade.marketDid} onChange={v => updateTrade(trade.id, "marketDid", v)} />
                                        </Field>
                                        <Field label="Would You Execute This Exact Setup Parameter Again?">
                                            <div className="flex gap-2">
                                                <Chip label="YES" active={trade.wouldTakeAgain === "yes"} onClick={() => updateTrade(trade.id, "wouldTakeAgain", "yes")} color="green" />
                                                <Chip label="MAYBE" active={trade.wouldTakeAgain === "maybe"} onClick={() => updateTrade(trade.id, "wouldTakeAgain", "maybe")} color="yellow" />
                                                <Chip label="NO" active={trade.wouldTakeAgain === "no"} onClick={() => updateTrade(trade.id, "wouldTakeAgain", "no")} color="red" />
                                            </div>
                                        </Field>
                                    </div>

                                    {/* Classification Tags Framework */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                                        <Field label="Applied System Setup Core Tag">
                                            <div className="flex flex-wrap gap-1.5 mt-1">
                                                {SETUP_TAGS.map(t => <Chip key={t} label={t} active={trade.setupTag === t} onClick={() => updateTrade(trade.id, "setupTag", trade.setupTag === t ? "" : t)} color="blue" />)}
                                            </div>
                                        </Field>
                                        {!isNaN(resultNum) && resultNum < 0 && (
                                            <Field label="Red Result Loss Attribution Category Root Cause">
                                                <div className="flex flex-wrap gap-1.5 mt-1">
                                                    {LOSS_TAGS.map(t => <Chip key={t} label={t} active={trade.lossTag === t} onClick={() => updateTrade(trade.id, "lossTag", trade.lossTag === t ? "" : t)} color="red" />)}
                                                </div>
                                            </Field>
                                        )}
                                    </div>

                                    {/* Execution Grading Section */}
                                    <div className="pt-2 border-t border-zinc-900">
                                        <Field label="Rules Execution Grade Assessment Assessment" hint="Grade the tactical execution sequence path, not the dollar outcome!">
                                            <div className="flex gap-2.5 mt-1">
                                                {GRADE_OPTIONS.map(g => {
                                                    const isActive = trade.grade === g;
                                                    const themes = {
                                                        A: isActive ? "bg-emerald-900 border-emerald-400 text-emerald-100" : "bg-zinc-900 text-zinc-400 border-zinc-800",
                                                        B: isActive ? "bg-blue-900 border-blue-400 text-blue-100" : "bg-zinc-900 text-zinc-400 border-zinc-800",
                                                        C: isActive ? "bg-yellow-900 border-yellow-400 text-yellow-100" : "bg-zinc-900 text-zinc-400 border-zinc-800",
                                                        F: isActive ? "bg-red-900 border-red-400 text-red-100" : "bg-zinc-900 text-zinc-400 border-zinc-800"
                                                    };
                                                    return (
                                                        <button key={g} type="button" onClick={() => updateTrade(trade.id, "grade", isActive ? "" : g)} className={`px-4 py-2 text-xs font-mono font-bold border rounded transition-all ${themes[g]}`}>
                                                            GRADE {g}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </Field>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Operational Core Metrics & Notes Forms Component */}
                    <div className="bg-zinc-950 border border-zinc-800 rounded-lg p-6 space-y-4">
                        <div className="text-xs font-bold tracking-widest text-indigo-400 uppercase font-mono">POST-SESSION ANALYSIS PERFORMANCE RATINGS</div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <Field label="Patience Score (1-10)"><input type="text" value={session.patienceScore || ""} onChange={e => updateSession("patienceScore", e.target.value)} placeholder="9" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none" /></Field>
                            <Field label="Cheat Rules Score (1-10)"><input type="text" value={session.cheatScore || ""} onChange={e => updateSession("cheatScore", e.target.value)} placeholder="10" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none" /></Field>
                            <Field label="Walk Aways Executed"><input type="text" value={session.walkAways || ""} onChange={e => updateSession("walkAways", e.target.value)} placeholder="2" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none" /></Field>
                            <Field label="Re-entry Double Triggers"><input type="text" value={session.reentryCount || ""} onChange={e => updateSession("reentryCount", e.target.value)} placeholder="0" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-sm rounded p-2 w-full outline-none" /></Field>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                            <Field label="Session Complete Notes / Core Lesson Learnt">
                                <textarea value={session.sessionNotes || ""} onChange={e => updateSession("sessionNotes", e.target.value)} rows="3" placeholder="What foundational market variable pattern structural behavior did this explicit session reveal to your thesis framework?" className="bg-zinc-900 border border-zinc-700 text-white font-mono text-xs rounded p-2 w-full outline-none resize-none focus:border-zinc-500" />
                            </Field>
                            <Field label="Session Risk Lifecycle Accountability Check">
                                <div className="bg-zinc-900 border border-zinc-800 rounded p-4 flex flex-col justify-center space-y-3">
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs text-zinc-400 font-mono">Did You Survive Account Loss Plan Guidelines?</span>
                                        <button type="button" onClick={() => updateSession("survived", !session.survived)} className={`px-3 py-1 font-mono text-xs rounded font-bold border transition ${session.survived ? 'bg-emerald-950 border-emerald-500 text-emerald-400' : 'bg-red-950 border-red-500 text-red-400'}`}>
                                            {session.survived ? "SURVIVED" : "FAILED PLAN"}
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs text-zinc-400 font-mono">Environment Pre-Classification Accurate?</span>
                                        <YesNo value={session.environmentCorrect} onChange={v => updateSession("environmentCorrect", v)} />
                                    </div>
                                </div>
                            </Field>
                        </div>
                    </div>

                    {/* Master Actions Buttons Execution Grid Row */}
                    <div className="flex gap-4 pb-12 font-mono">
                        <button type="button" onClick={addTradeRow} className="flex-1 py-3 text-xs font-bold border-2 border-dashed border-zinc-700 hover:border-zinc-500 rounded-lg text-zinc-300 hover:bg-zinc-900/40 transition">
                            + ADD NEW SEPARATE TRADE LOGGER LAYER
                        </button>
                        <button type="button" onClick={() => onSave(session)} className="flex-1 py-3 text-xs font-bold rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition tracking-wide font-mono shadow-xl shadow-indigo-950/20">
                            💾 PIN COMPLETED LOG SESSION TO REGISTER
                        </button>
                    </div>
                </div>
            );
        }

        // --- VIEW 2: STATISTICAL METRICS & GRAND SLAMS DASHBOARD ---
        function DashboardView({ sessions, onLoadSession }) {
            const [activeSubView, setActiveSubView] = useState("overview");

            if (!sessions || sessions.length === 0) {
                return (
                    <div className="h-96 flex flex-col items-center justify-center gap-2 font-mono border border-zinc-800 rounded-xl bg-zinc-950 max-w-4xl mx-auto">
                        <div className="text-sm text-zinc-500 uppercase tracking-widest">Database Store Registries Currently Empty</div>
                        <div className="text-xs text-zinc-700">Save structured tracking logs inside the terminal frame to compile calculations visualization grids.</div>
                    </div>
                );
            }

            // Calculation Core Computations Base Framework Engines
            const allTrades = sessions.flatMap(s => (s.trades || []).map(t => ({ ...t, sessionDate: s.date, env: s.environment })));
            const withRes = allTrades.filter(t => t.result !== "" && !isNaN(parseFloat(t.result)));
            const winners = withRes.filter(t => parseFloat(t.result) >= 0);
            const losers = withRes.filter(t => parseFloat(t.result) < 0);
            
            const totalPnL = withRes.reduce((s, t) => s + parseFloat(t.result), 0);
            const winRate = withRes.length > 0 ? ((winners.length / withRes.length) * 100).toFixed(1) : "0.0";
            
            const avgWin = winners.length > 0 ? (winners.reduce((s, t) => s + parseFloat(t.result), 0) / winners.length) : 0;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
