<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaizen Trade Autopsy</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08080a;color:#e4e4e7;font-family:'JetBrains Mono','Courier New',monospace;min-height:100vh}
button,input,textarea,select{font-family:inherit;cursor:pointer}
input,textarea,select{cursor:text}
input::placeholder,textarea::placeholder{color:#3f3f46}
.fi{background:#18181b;border:1px solid #3f3f46;color:#f4f4f5;border-radius:4px;padding:8px 12px;font-size:13px;width:100%}
.fi:focus{outline:none;border-color:#a1a1aa}
.fi.sm{font-size:11px;padding:4px 8px}
textarea.fi{resize:none}
.chip{display:inline-block;padding:4px 12px;font-size:11px;border:1px solid #3f3f46;border-radius:4px;background:#18181b;color:#a1a1aa;cursor:pointer;transition:all .15s}
.chip.blue{background:#1e1b4b;border-color:#6366f1;color:#c7d2fe}
.chip.green{background:#064e3b;border-color:#10b981;color:#6ee7b7}
.chip.red{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.chip.yellow{background:#422006;border-color:#f59e0b;color:#fde68a}
.chip.gA{background:#064e3b;border-color:#34d399;color:#d1fae5}
.chip.gB{background:#1e3a5f;border-color:#60a5fa;color:#dbeafe}
.chip.gC{background:#422006;border-color:#fbbf24;color:#fef3c7}
.chip.gF{background:#450a0a;border-color:#f87171;color:#fee2e2}
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr!important}.g3{grid-template-columns:1fr!important}.g2{grid-template-columns:1fr!important}}
@media print{#topnav{display:none!important}.no-print{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ─── palette ───────────────────────────────────────────────────────────────
const C={
  bg:"#08080a",surf:"#0f0f12",card:"#141417",
  b1:"#27272a",b2:"#3f3f46",
  tx:"#e4e4e7",mu:"#71717a",fa:"#3f3f46",
  gr:"#10b981",grB:"#064e3b",grT:"#6ee7b7",
  rd:"#ef4444",rdB:"#450a0a",rdT:"#fca5a5",
  bl:"#6366f1",blB:"#1e1b4b",blT:"#a5b4fc",
  yl:"#eab308",ylB:"#422006",ylT:"#fde047",
};
const mono={fontFamily:"'JetBrains Mono','Courier New',monospace"};

// ─── storage ────────────────────────────────────────────────────────────────
const SK="kaizen:sessions";
function loadSessions(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):[]}catch{return[]}}
function saveSessions(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch{}}

// ─── constants ──────────────────────────────────────────────────────────────
const ENV_OPT=["ROTATIONAL","TRENDING","CHOP","EXPANSION","UNKNOWN"];
const GRADE_OPT=["A","B","C","F"];
const SETUP_TAGS=["BREAKOUT","PULLBACK","REVERSAL","CONTINUATION","OPENING RANGE","FAILED AUCTION","ANTICIPATION","FOMO","CHASE","OTHER"];
const LOSS_TAGS=["EARLY","CHOP","REVERSAL","CHASE","OVERSIZED","FOMO","LOW VOLUME","COUNTERTREND","OPENING RANGE NOISE","EXPANSION"];

const mkTrade=()=>({id:Date.now()+Math.random(),direction:"",time:"",entry:"",exit:"",result:"",grade:"",immediateFollowThrough:null,negotiable:null,mae:"",mfe:"",why:"",wouldTakeAgain:null,marketDid:null,lossTag:"",setupTag:"",doNothingOutcome:"",notes:""});
const mkSession=()=>({id:Date.now()+Math.random(),date:new Date().toISOString().slice(0,10),environment:"",environmentCorrect:null,firstTradeSetup:null,cheatScore:"",patienceScore:"",walkAways:"",reentryCount:"",sessionNotes:"",trades:[mkTrade()],avoided:[],survived:null});

// ─── tiny shared components ─────────────────────────────────────────────────
function Chip({label,active,onClick,cls}){
  return <button onClick={onClick} className={`chip${active&&cls?" "+cls:""}`}>{label}</button>;
}
function YN({val,onChange,yL="YES",nL="NO"}){
  return <div style={{display:"flex",gap:6}}>
    <Chip label={yL} active={val===true}  cls="green" onClick={()=>onChange(val===true?null:true)}/>
    <Chip label={nL} active={val===false} cls="red"   onClick={()=>onChange(val===false?null:false)}/>
  </div>;
}
function Fld({label,hint,children}){
  return <div style={{marginBottom:14}}>
    <div style={{...mono,color:C.mu,fontSize:9,letterSpacing:"0.15em",marginBottom:4}}>{label}</div>
    {hint&&<div style={{...mono,color:C.fa,fontSize:9,fontStyle:"italic",marginBottom:4}}>{hint}</div>}
    {children}
  </div>;
}
function Inp({val,onChange,ph,type="text",sm}){
  return <input type={type} value={val} onChange={e=>onChange(e.target.value)} placeholder={ph} className={`fi${sm?" sm":""}`}/>;
}
function TA({val,onChange,ph,rows=2}){
  return <textarea value={val} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={rows} className="fi"/>;
}
function SecHead({children}){
  return <div style={{...mono,color:C.mu,fontSize:9,letterSpacing:"0.2em",marginBottom:10,marginTop:22}}>{children}</div>;
}
function Card({children,style={}}){
  return <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:16,...style}}>{children}</div>;
}

// ─── SVG CHARTS (zero deps) ─────────────────────────────────────────────────
function LineChartSVG({data,width=800,height=160,color="#6366f1"}){
  if(!data||data.length<2) return <div style={{...mono,color:C.mu,fontSize:10,padding:"20px",textAlign:"center"}}>Not enough data yet.</div>;
  const W=width,H=height,pad={t:10,r:10,b:28,l:48};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const vals=data.map(d=>d.y);
  const minY=Math.min(0,...vals), maxY=Math.max(0,...vals);
  const rangeY=maxY-minY||1;
  const scX=i=>(i/(data.length-1))*iW;
  const scY=v=>iH-((v-minY)/rangeY)*iH;
  const pts=data.map((d,i)=>`${scX(i)},${scY(d.y)}`).join(" ");
  const zeroY=scY(0);
  // x labels — show up to 8
  const step=Math.max(1,Math.floor(data.length/8));
  const xLabels=data.filter((_,i)=>i%step===0||i===data.length-1);
  // y labels
  const yTicks=5;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      <g transform={`translate(${pad.l},${pad.t})`}>
        {/* zero line */}
        <line x1={0} y1={zeroY} x2={iW} y2={zeroY} stroke={C.b2} strokeDasharray="3 3"/>
        {/* y grid + labels */}
        {Array.from({length:yTicks+1},(_,i)=>{
          const v=minY+(rangeY/yTicks)*i;
          const y=scY(v);
          return <g key={i}>
            <line x1={0} y1={y} x2={iW} y2={y} stroke={C.b1} strokeWidth={0.5}/>
            <text x={-6} y={y} textAnchor="end" dominantBaseline="middle" fill={C.mu} fontSize={8} fontFamily="monospace">
              {v>=0?"+":""}{Math.round(v)}
            </text>
          </g>;
        })}
        {/* area fill */}
        <polygon points={`0,${zeroY} ${pts} ${scX(data.length-1)},${zeroY}`} fill={color} fillOpacity={0.08}/>
        {/* line */}
        <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
        {/* dots at endpoints */}
        <circle cx={scX(0)} cy={scY(data[0].y)} r={3} fill={color}/>
        <circle cx={scX(data.length-1)} cy={scY(data[data.length-1].y)} r={3} fill={color}/>
        {/* x labels */}
        {xLabels.map((d,i)=>{
          const idx=data.indexOf(d);
          return <text key={i} x={scX(idx)} y={iH+18} textAnchor="middle" fill={C.mu} fontSize={8} fontFamily="monospace">{d.label}</text>;
        })}
      </g>
    </svg>
  );
}

function BarChartSVG({data,width=800,height=120}){
  if(!data||data.length===0) return null;
  const W=width,H=height,pad={t:10,r:10,b:28,l:48};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const vals=data.map(d=>d.y);
  const maxAbs=Math.max(...vals.map(Math.abs),1);
  const scY=v=>((Math.abs(v))/maxAbs)*(iH/2);
  const zeroY=iH/2;
  const bw=Math.max(2,(iW/data.length)-2);
  const step=Math.max(1,Math.floor(data.length/8));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}>
      <g transform={`translate(${pad.l},${pad.t})`}>
        <line x1={0} y1={zeroY} x2={iW} y2={zeroY} stroke={C.b2}/>
        {data.map((d,i)=>{
          const x=(i/data.length)*iW+(iW/data.length-bw)/2;
          const barH=scY(d.y);
          const y=d.y>=0?zeroY-barH:zeroY;
          return <rect key={i} x={x} y={y} width={bw} height={barH} fill={d.y>=0?C.gr:C.rd} rx={1}/>;
        })}
        {data.filter((_,i)=>i%step===0||i===data.length-1).map((d,i)=>{
          const idx=data.indexOf(d);
          const x=(idx/data.length)*iW+(iW/data.length)/2;
          return <text key={i} x={x} y={iH+18} textAnchor="middle" fill={C.mu} fontSize={8} fontFamily="monospace">{d.label}</text>;
        })}
      </g>
    </svg>
  );
}

// ─── TRADE CARD ─────────────────────────────────────────────────────────────
function TradeCard({trade,index,onChange,onRemove}){
  const up=(k,v)=>onChange({...trade,[k]:v});
  const res=parseFloat(trade.result);
  const resColor=isNaN(res)?C.mu:res>=0?C.gr:C.rd;
  return (
    <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:16,marginBottom:12}}>
      {/* header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{display:"flex",gap:10,alignItems:"baseline"}}>
          <span style={{...mono,color:C.mu,fontSize:10}}>TRADE</span>
          <span style={{...mono,color:C.tx,fontSize:18,fontWeight:700}}>#{index+1}</span>
          {trade.result!==""&&<span style={{...mono,color:resColor,fontSize:14,fontWeight:700}}>{res>=0?"+":""}{trade.result}</span>}
        </div>
        <button onClick={onRemove} style={{...mono,background:"none",border:"none",color:C.fa,fontSize:10,cursor:"pointer",padding:"2px 6px"}}
          onMouseOver={e=>e.currentTarget.style.color=C.mu} onMouseOut={e=>e.currentTarget.style.color=C.fa}>REMOVE</button>
      </div>
      {/* row 1 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}} className="g4">
        <Fld label="TIME"><Inp val={trade.time} onChange={v=>up("time",v)} ph="8:32"/></Fld>
        <Fld label="DIRECTION">
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <Chip label="LONG"  active={trade.direction==="LONG"}  cls="green" onClick={()=>up("direction",trade.direction==="LONG"?"":"LONG")}/>
            <Chip label="SHORT" active={trade.direction==="SHORT"} cls="red"   onClick={()=>up("direction",trade.direction==="SHORT"?"":"SHORT")}/>
          </div>
        </Fld>
        <Fld label="ENTRY"><Inp val={trade.entry} onChange={v=>up("entry",v)} ph="21,450"/></Fld>
        <Fld label="EXIT"><Inp val={trade.exit}  onChange={v=>up("exit",v)}  ph="21,460"/></Fld>
      </div>
      {/* row 2 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}} className="g3">
        <Fld label="RESULT ($)" hint="Actual P&L in dollars"><Inp val={trade.result} onChange={v=>up("result",v)} ph="+50"/></Fld>
        <Fld label="MAE (pts)" hint="How far against you — TIER 1"><Inp val={trade.mae} onChange={v=>up("mae",v)} ph="8"/></Fld>
        <Fld label="MFE (pts)" hint="How far in your favor before exit"><Inp val={trade.mfe} onChange={v=>up("mfe",v)} ph="12"/></Fld>
      </div>
      {/* IFT / Neg */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}} className="g2">
        <Fld label="IMMEDIATE FOLLOW THROUGH?" hint="Did price move your way almost immediately?"><YN val={trade.immediateFollowThrough} onChange={v=>up("immediateFollowThrough",v)}/></Fld>
        <Fld label="MARKET NEGOTIABLE?" hint="Did you have time to manage, or did it move too fast?"><YN val={trade.negotiable} onChange={v=>up("negotiable",v)}/></Fld>
      </div>
      {/* Why */}
      <Fld label="WHY DID I TAKE IT?" hint="One sentence only."><TA val={trade.why} onChange={v=>up("why",v)} ph="e.g. Failed auction at prior high" rows={1}/></Fld>
      {/* Setup tag */}
      <Fld label="SETUP TAG">
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {SETUP_TAGS.map(t=><Chip key={t} label={t} active={trade.setupTag===t} cls="blue" onClick={()=>up("setupTag",trade.setupTag===t?"":t)}/>)}
        </div>
      </Fld>
      {/* Loss tag */}
      {!isNaN(res)&&res<0&&(
        <Fld label="LOSS CATEGORY" hint="Tag every losing trade">
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {LOSS_TAGS.map(t=><Chip key={t} label={t} active={trade.lossTag===t} cls="red" onClick={()=>up("lossTag",trade.lossTag===t?"":t)}/>)}
          </div>
        </Fld>
      )}
      {/* Market did / Would take again */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}} className="g2">
        <Fld label="DID MARKET DO WHAT I EXPECTED?"><YN val={trade.marketDid} onChange={v=>up("marketDid",v)}/></Fld>
        <Fld label="WOULD TAKE AGAIN?">
          <div style={{display:"flex",gap:6}}>
            <Chip label="YES"   active={trade.wouldTakeAgain==="yes"}   cls="green"  onClick={()=>up("wouldTakeAgain",trade.wouldTakeAgain==="yes"?null:"yes")}/>
            <Chip label="MAYBE" active={trade.wouldTakeAgain==="maybe"} cls="yellow" onClick={()=>up("wouldTakeAgain",trade.wouldTakeAgain==="maybe"?null:"maybe")}/>
            <Chip label="NO"    active={trade.wouldTakeAgain==="no"}    cls="red"    onClick={()=>up("wouldTakeAgain",trade.wouldTakeAgain==="no"?null:"no")}/>
          </div>
        </Fld>
      </div>
      {/* Grade */}
      <Fld label="TRADE GRADE" hint="Grade the TRADE, not the result. A losing trade can be an A.">
        <div style={{display:"flex",gap:8}}>
          {GRADE_OPT.map(g=><Chip key={g} label={g} active={trade.grade===g} cls={`g${g}`} onClick={()=>up("grade",trade.grade===g?"":g)}/>)}
        </div>
      </Fld>
      {/* Do nothing */}
      <Fld label="WHAT WOULD'VE HAPPENED IF I DID NOTHING?" hint="Forces comparison vs. the monster move.">
        <TA val={trade.doNothingOutcome} onChange={v=>up("doNothingOutcome",v)} ph="e.g. Better entry appeared 4 min later / Saved $80" rows={1}/>
      </Fld>
      {/* Notes */}
      <Fld label="NOTES / LESSON"><TA val={trade.notes} onChange={v=>up("notes",v)} ph="One sentence lesson." rows={1}/></Fld>
    </div>
  );
}

// ─── SUMMARY PANEL ──────────────────────────────────────────────────────────
function SummaryPanel({session}){
  const trades=session.trades||[];
  const withR=trades.filter(t=>t.result!==""&&!isNaN(parseFloat(t.result)));
  const pnl=withR.reduce((s,t)=>s+parseFloat(t.result),0);
  const wins=withR.filter(t=>parseFloat(t.result)>=0);
  const loss=withR.filter(t=>parseFloat(t.result)<0);
  const wr=withR.length>0?Math.round(wins.length/withR.length*100):null;
  const wMAE=wins.filter(t=>t.mae!=="").length>0?(wins.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae||0),0)/wins.filter(t=>t.mae!=="").length).toFixed(1):null;
  const lMAE=loss.filter(t=>t.mae!=="").length>0?(loss.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae||0),0)/loss.filter(t=>t.mae!=="").length).toFixed(1):null;
  const iftY=trades.filter(t=>t.immediateFollowThrough===true).length;
  const iftN=trades.filter(t=>t.immediateFollowThrough===false).length;
  const nY=trades.filter(t=>t.negotiable===true).length;
  const nN=trades.filter(t=>t.negotiable===false).length;
  const gc={A:0,B:0,C:0,F:0};
  trades.forEach(t=>{if(t.grade)gc[t.grade]++;});
  const lt={};
  loss.forEach(t=>{if(t.lossTag)lt[t.lossTag]=(lt[t.lossTag]||0)+1;});
  const fiveQ=[{q:"Did I follow rules?",k:"followedRules"},{q:"Did I protect both accounts?",k:"protectedAccounts"},{q:"Did I record everything?",k:"recorded"},{q:"Did I review?",k:"reviewed"},{q:"Did I survive?",k:"survived"}];
  const [ck,setCk]=useState({followedRules:null,protectedAccounts:null,recorded:null,reviewed:null,survived:null});
  const gC={A:C.gr,B:C.bl,C:C.yl,F:C.rd};
  return (
    <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:16,marginBottom:16}}>
      <div style={{...mono,color:C.mu,fontSize:9,letterSpacing:"0.2em",marginBottom:12}}>SESSION SUMMARY</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}} className="g4">
        {[{l:"NET P&L",v:(pnl>=0?"+":"")+pnl.toFixed(0),c:pnl>=0?C.gr:C.rd},{l:"WIN RATE",v:wr!==null?wr+"%":"—",c:C.tx},{l:"AVG MAE (W)",v:wMAE||"—",c:C.gr},{l:"AVG MAE (L)",v:lMAE||"—",c:C.rd}].map(({l,v,c})=>(
          <div key={l} style={{background:C.surf,borderRadius:6,padding:"10px 8px",textAlign:"center"}}>
            <div style={{...mono,color:C.mu,fontSize:8,marginBottom:4}}>{l}</div>
            <div style={{...mono,color:c,fontSize:20,fontWeight:700}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}} className="g2">
        <div style={{background:C.surf,borderRadius:6,padding:12}}>
          <div style={{...mono,color:C.mu,fontSize:8,marginBottom:8}}>TRADE GRADES</div>
          <div style={{display:"flex",gap:16}}>
            {["A","B","C","F"].map(g=><div key={g} style={{textAlign:"center"}}>
              <div style={{...mono,color:gC[g],fontSize:18,fontWeight:700}}>{gc[g]}</div>
              <div style={{...mono,color:C.mu,fontSize:9}}>{g}</div>
            </div>)}
          </div>
        </div>
        <div style={{background:C.surf,borderRadius:6,padding:12}}>
          <div style={{...mono,color:C.mu,fontSize:8,marginBottom:8}}>IFT / NEGOTIABLE</div>
          <div style={{...mono,fontSize:10}}>
            <div><span style={{color:C.gr}}>{iftY}</span> IFT Yes / <span style={{color:C.rd}}>{iftN}</span> No</div>
            <div style={{marginTop:4}}><span style={{color:C.gr}}>{nY}</span> Neg Yes / <span style={{color:C.rd}}>{nN}</span> No</div>
          </div>
        </div>
      </div>
      {Object.keys(lt).length>0&&(
        <div style={{background:C.surf,borderRadius:6,padding:12,marginBottom:12}}>
          <div style={{...mono,color:C.mu,fontSize:8,marginBottom:8}}>LOSS BREAKDOWN</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {Object.entries(lt).sort((a,b)=>b[1]-a[1]).map(([tag,cnt])=>(
              <span key={tag} style={{...mono,fontSize:10}}><span style={{color:C.rd,fontWeight:700}}>{cnt}</span> <span style={{color:C.mu}}>{tag}</span></span>
            ))}
          </div>
        </div>
      )}
      <div style={{background:C.surf,borderRadius:6,padding:12}}>
        <div style={{...mono,color:C.mu,fontSize:8,marginBottom:10}}>POST-SESSION CHECKLIST</div>
        {fiveQ.map(({q,k})=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{...mono,color:C.tx,fontSize:10}}>{q}</span>
            <YN val={ck[k]} onChange={v=>setCk(p=>({...p,[k]:v}))}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── TRADES AVOIDED ─────────────────────────────────────────────────────────
function TradesAvoided({avoided,setAvoided}){
  const add=()=>setAvoided(p=>[...p,{id:Date.now()+Math.random(),setup:"",passed:null,outcome:""}]);
  const upd=(id,k,v)=>setAvoided(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));
  const rm=(id)=>setAvoided(p=>p.filter(a=>a.id!==id));
  return (
    <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:16,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{...mono,color:C.mu,fontSize:9,letterSpacing:"0.15em"}}>TRADES AVOIDED</div>
          <div style={{...mono,color:C.fa,fontSize:9,fontStyle:"italic",marginTop:3}}>Every correctly avoided garbage setup = +1 point. This is a skill.</div>
        </div>
        <button onClick={add} className="chip">+ ADD</button>
      </div>
      {avoided.length===0&&<div style={{...mono,color:C.fa,fontSize:10,textAlign:"center",padding:"12px 0"}}>No avoided setups logged yet.</div>}
      {avoided.map(a=>(
        <div key={a.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8,alignItems:"end"}} className="g3">
          <div><div style={{...mono,color:C.mu,fontSize:9,marginBottom:4}}>Setup Seen</div><Inp val={a.setup} onChange={v=>upd(a.id,"setup",v)} ph="Chop reversal" sm/></div>
          <div><div style={{...mono,color:C.mu,fontSize:9,marginBottom:4}}>Passed?</div><YN val={a.passed} onChange={v=>upd(a.id,"passed",v)}/></div>
          <div><div style={{...mono,color:C.mu,fontSize:9,marginBottom:4}}>Outcome</div><Inp val={a.outcome} onChange={v=>upd(a.id,"outcome",v)} ph="Would've lost" sm/></div>
        </div>
      ))}
      {avoided.length>0&&<div style={{textAlign:"right",...mono,fontSize:10,marginTop:4}}>
        <span style={{color:C.gr,fontWeight:700}}>{avoided.filter(a=>a.passed===true).length}</span>
        <span style={{color:C.mu}}> setups correctly avoided</span>
      </div>}
    </div>
  );
}

        <div style={{...mono,color:C.fa,fontSize:10,textAlign:"center",marginTop:20,fontStyle:"italic"}}>The account staying open is the win condition. Profit is the bonus.</div>

// ─── GRAND SLAMS ─────────────────────────────────────────────────────────────
function GrandSlams({stats}){
  const slams=[
    {l:"Trades Reviewed",       v:stats.totalTrades,          t:[100,500,1000]},
    {l:"Sessions Logged",        v:stats.totalSessions,        t:[30,100,250]},
    {l:"Consecutive Logged",     v:stats.currentStreak,        t:[5,10,20,50]},
    {l:"Chop Avoided",           v:stats.totalAvoided,         t:[20,50,100]},
    {l:"Correct Env Calls",      v:stats.correctEnvCalls,      t:[10,30,75]},
    {l:"A-Grade Trades",         v:stats.aGrades,              t:[25,100,250]},
    {l:"F-Grade Free Streak",    v:stats.freeStreak,           t:[10,25,50]},
    {l:"Non-Expansion Sessions", v:stats.nonExpansionSessions, t:[10,30,60]},
  ];
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}} className="g2">
      {slams.map(s=>{
        const next=s.t.find(x=>x>s.v)||s.t[s.t.length-1];
        const prev=s.t[s.t.indexOf(next)-1]||0;
        const pct=next>prev?Math.min(100,((s.v-prev)/(next-prev))*100):100;
        const done=s.v>=next;
        return (
          <div key={s.l} style={{background:C.card,border:`1px solid ${done?C.gr:C.b2}`,borderRadius:8,padding:"12px 14px"}}>
            <div style={{...mono,color:done?C.grT:C.mu,fontSize:9,letterSpacing:"0.1em",marginBottom:4}}>{s.l}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:8}}>
              <span style={{...mono,color:done?C.gr:C.tx,fontSize:20,fontWeight:700}}>{s.v}</span>
              <span style={{...mono,color:C.fa,fontSize:10}}>/ {next}</span>
            </div>
            <div style={{background:C.surf,borderRadius:2,height:3}}>
              <div style={{background:done?C.gr:C.bl,height:3,borderRadius:2,width:pct+"%",transition:"width .5s"}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({sessions}){
  const [view,setView]=useState("overview");

  const all=sessions.flatMap(s=>(s.trades||[]).map(t=>({...t,sessionDate:s.date})));
  const withR=all.filter(t=>t.result!==""&&!isNaN(parseFloat(t.result)));
  const wins=withR.filter(t=>parseFloat(t.result)>=0);
  const loss=withR.filter(t=>parseFloat(t.result)<0);
  const pnl=withR.reduce((s,t)=>s+parseFloat(t.result),0);
  const wr=withR.length>0?(wins.length/withR.length*100).toFixed(1):"—";
  const avgW=wins.length>0?(wins.reduce((s,t)=>s+parseFloat(t.result),0)/wins.length).toFixed(0):0;
  const avgL=loss.length>0?(loss.reduce((s,t)=>s+parseFloat(t.result),0)/loss.length).toFixed(0):0;
  const wMAE=wins.filter(t=>t.mae!=="").length>0?(wins.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae),0)/wins.filter(t=>t.mae!=="").length).toFixed(1):"—";
  const lMAE=loss.filter(t=>t.mae!=="").length>0?(loss.filter(t=>t.mae!=="").reduce((s,t)=>s+parseFloat(t.mae),0)/loss.filter(t=>t.mae!=="").length).toFixed(1):"—";
  const iftY=all.filter(t=>t.immediateFollowThrough===true).length;
  const iftN=all.filter(t=>t.immediateFollowThrough===false).length;
  const nY=all.filter(t=>t.negotiable===true).length;
  const nN=all.filter(t=>t.negotiable===false).length;

  // cumulative pnl curve
  const curve=withR.map((t,i)=>({y:withR.slice(0,i+1).reduce((s,x)=>s+parseFloat(x.result),0),label:String(i+1)}));

  // daily bars
  const byDate={};
  withR.forEach(t=>{byDate[t.sessionDate]=(byDate[t.sessionDate]||0)+parseFloat(t.result)});
  const daily=Object.entries(byDate).sort().map(([d,v])=>({y:v,label:d.slice(5)}));

  // grades
  const gc={A:0,B:0,C:0,F:0};
  all.forEach(t=>{if(t.grade)gc[t.grade]++});

  // env pnl
  const envP={};
  sessions.forEach(s=>{
    if(!s.environment)return;
    const sp=(s.trades||[]).filter(t=>t.result!==""&&!isNaN(parseFloat(t.result))).reduce((x,t)=>x+parseFloat(t.result),0);
    if(!envP[s.environment]){envP[s.environment]={pnl:0,cnt:0}}
    envP[s.environment].pnl+=sp; envP[s.environment].cnt++;
  });

  // loss tags
  const lt={};
  loss.forEach(t=>{if(t.lossTag)lt[t.lossTag]=(lt[t.lossTag]||0)+1});
  const topLoss=Object.entries(lt).sort((a,b)=>b[1]-a[1]);

  // setup WR
  const swr={};
  withR.forEach(t=>{if(!t.setupTag)return;if(!swr[t.setupTag])swr[t.setupTag]={w:0,l:0};parseFloat(t.result)>=0?swr[t.setupTag].w++:swr[t.setupTag].l++});

  // grand slams stats
  const totalAvoided=sessions.reduce((s,x)=>(x.avoided||[]).filter(a=>a.passed===true).length+s,0);
  const correctEnvCalls=sessions.filter(s=>s.environmentCorrect===true).length;
  let freeStreak=0;
  for(let i=all.length-1;i>=0;i--){if(all[i].grade==="F")break;if(all[i].grade)freeStreak++}
  const gStats={totalTrades:all.length,totalSessions:sessions.length,currentStreak:sessions.length,totalAvoided,correctEnvCalls,aGrades:gc.A,freeStreak,nonExpansionSessions:sessions.filter(s=>s.environment&&s.environment!=="EXPANSION"&&s.environment!=="CHOP").length};

  const tabStyle=(id)=>({...mono,background:"none",border:"none",borderBottom:`2px solid ${view===id?C.bl:"transparent"}`,color:view===id?C.blT:C.mu,padding:"10px 16px",fontSize:11,cursor:"pointer",letterSpacing:"0.1em",transition:"all .15s"});

  if(sessions.length===0) return (
    <div style={{...mono,color:C.mu,fontSize:12,textAlign:"center",padding:"80px 20px"}}>
      <div>No sessions saved yet.</div>
      <div style={{color:C.fa,fontSize:10,marginTop:8}}>Complete a session in the Logger tab and hit Save Session.</div>
    </div>
  );

  return (
    <div style={{...mono,color:C.tx}}>
      {/* sub-tabs */}
      <div style={{borderBottom:`1px solid ${C.b1}`,display:"flex",paddingLeft:4,background:C.bg}}>
        {[["overview","OVERVIEW"],["slams","GRAND SLAMS"],["trades","TRADE BREAKDOWN"],["sessions","SESSION LOG"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setView(id)} style={tabStyle(id)}>{lbl}</button>
        ))}
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"16px 16px"}}>
        {/* pnl badge */}
        <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:6,marginBottom:8}}>
          <span style={{color:pnl>=0?C.gr:C.rd,fontSize:18,fontWeight:700}}>{pnl>=0?"+":""}{pnl.toFixed(0)}</span>
          <span style={{color:C.mu,fontSize:10}}>all-time</span>
        </div>

        {/* ── OVERVIEW ── */}
        {view==="overview"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}} className="g4">
            {[{l:"NET P&L ($)",v:`${pnl>=0?"+":""}${pnl.toFixed(0)}`,c:pnl>=0?C.gr:C.rd,s:`${sessions.length} sessions`},
              {l:"WIN RATE",v:`${wr}%`,c:parseFloat(wr)>=55?C.gr:parseFloat(wr)>=45?C.yl:C.rd,s:`${wins.length}W / ${loss.length}L`},
              {l:"AVG WIN / LOSS",v:`+${avgW}`,c:C.gr,s:`avg loss ${avgL}`},
              {l:"TRADES REVIEWED",v:all.length,c:C.bl,s:`${totalAvoided} avoided`}].map(({l,v,c,s})=>(
              <div key={l} style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{color:C.mu,fontSize:9,letterSpacing:"0.12em",marginBottom:5}}>{l}</div>
                <div style={{color:c,fontSize:22,fontWeight:700}}>{v}</div>
                {s&&<div style={{color:C.fa,fontSize:10,marginTop:3}}>{s}</div>}
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}} className="g4">
            {[{l:"MAE WINNERS (pts)",v:wMAE,c:C.gr,s:"avg adverse excursion"},
              {l:"MAE LOSERS (pts)",v:lMAE,c:C.rd,s:"avg adverse excursion"},
              {l:"IFT YES / NO",v:`${iftY} / ${iftN}`,c:C.tx,s:"immediate followthrough"},
              {l:"NEGOTIABLE Y / N",v:`${nY} / ${nN}`,c:C.tx,s:"market gave time"}].map(({l,v,c,s})=>(
              <div key={l} style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{color:C.mu,fontSize:9,letterSpacing:"0.12em",marginBottom:5}}>{l}</div>
                <div style={{color:c,fontSize:22,fontWeight:700}}>{v}</div>
                {s&&<div style={{color:C.fa,fontSize:10,marginTop:3}}>{s}</div>}
              </div>
            ))}
          </div>

          <SecHead>CUMULATIVE P&amp;L</SecHead>
          <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:"12px 8px",marginBottom:16}}>
            <LineChartSVG data={curve} height={160} color={C.bl}/>
          </div>

          <SecHead>DAILY P&amp;L</SecHead>
          <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:"12px 8px",marginBottom:16}}>
            <BarChartSVG data={daily} height={120}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}} className="g2">
            <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:14}}>
              <SecHead>TRADE GRADES</SecHead>
              {[["A",C.gr],["B",C.bl],["C",C.yl],["F",C.rd]].map(([g,col])=>{
                const max=Math.max(...Object.values(gc),1);
                const pct=max>0?(gc[g]/max)*100:0;
                return <div key={g} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{color:C.mu,fontSize:10}}>{g}</span>
                    <span style={{color:C.tx,fontSize:10,fontWeight:700}}>{gc[g]}</span>
                  </div>
                  <div style={{background:C.surf,borderRadius:2,height:4}}>
                    <div style={{background:col,height:4,borderRadius:2,width:pct+"%",transition:"width .4s"}}/>
                  </div>
                </div>;
              })}
            </div>
            <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:14}}>
              <SecHead>P&amp;L BY ENVIRONMENT</SecHead>
              {Object.entries(envP).sort((a,b)=>b[1].pnl-a[1].pnl).map(([env,{pnl:ep,cnt}])=>(
                <div key={env} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>

                    <span style={{color:ep>=0?C.gr:C.rd,fontSize:11,fontWeight:700}}>{ep>=0?"+":""}{ep.toFixed(0)}</span>
                    <span style={{color:C.fa,fontSize:9,marginLeft:6}}>({cnt})</span>
                  </div>
                </div>

            </div>
          </div>

          {topLoss.length>0&&<>
            <SecHead>LOSS BREAKDOWN — YOUR ENEMY</SecHead>
            <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:14,marginBottom:16}}>

            <SecHead>WIN RATE BY SETUP</SecHead>
            <div style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:14}}>

            <div style={{color:C.fa,fontSize:11,fontStyle:"italic",lineHeight:1.9}}>

        {view==="trades"&&<>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.b2}`}}>
                  {["Date","Dir","Result","MAE","MFE","Grade","IFT","Neg","Setup","Loss Tag","Why"].map(h=>(
                    <th key={h} style={{color:C.mu,padding:"8px 8px",textAlign:"left",fontWeight:400,fontSize:9,letterSpacing:"0.1em",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {all.map((t,i)=>{
                  const res=parseFloat(t.result);
                  return <tr key={i} style={{borderBottom:`1px solid ${C.b1}`}}>
                    <td style={{padding:"6px 8px",color:C.mu,whiteSpace:"nowrap"}}>{t.sessionDate}</td>
                    <td style={{padding:"6px 8px",color:t.direction==="LONG"?C.gr:t.direction==="SHORT"?C.rd:C.mu}}>{t.direction||"—"}</td>
                    <td style={{padding:"6px 8px",color:isNaN(res)?C.mu:res>=0?C.gr:C.rd,fontWeight:700}}>{isNaN(res)?t.result:`${res>=0?"+":""}${res}`}</td>
                    <td style={{padding:"6px 8px",color:C.yl}}>{t.mae||"—"}</td>
                    <td style={{padding:"6px 8px",color:C.mu}}>{t.mfe||"—"}</td>
                    <td style={{padding:"6px 8px",color:t.grade==="A"?C.gr:t.grade==="B"?C.bl:t.grade==="C"?C.yl:t.grade==="F"?C.rd:C.mu,fontWeight:700}}>{t.grade||"—"}</td>
                    <td style={{padding:"6px 8px",color:t.immediateFollowThrough===true?C.gr:t.immediateFollowThrough===false?C.rd:C.fa}}>{t.immediateFollowThrough===true?"Y":t.immediateFollowThrough===false?"N":"—"}</td>
                    <td style={{padding:"6px 8px",color:t.negotiable===true?C.gr:t.negotiable===false?C.rd:C.fa}}>{t.negotiable===true?"Y":t.negotiable===false?"N":"—"}</td>
                    <td style={{padding:"6px 8px",color:C.mu,whiteSpace:"nowrap"}}>{t.setupTag||"—"}</td>
                    <td style={{padding:"6px 8px",color:C.rd,whiteSpace:"nowrap"}}>{t.lossTag||"—"}</td>
                    <td style={{padding:"6px 8px",color:C.mu,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.why||"—"}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── SESSION LOG ── */}
        {view==="sessions"&&<>
          {[...sessions].reverse().map(s=>{
            const st=s.trades||[];
            const wr2=st.filter(t=>!isNaN(parseFloat(t.result)));
            const sp=wr2.reduce((x,t)=>x+parseFloat(t.result),0);
            const sw=wr2.filter(t=>parseFloat(t.result)>=0).length;
            return <div key={s.id} style={{background:C.card,border:`1px solid ${C.b2}`,borderRadius:8,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div>
                  <span style={{color:C.tx,fontSize:13,fontWeight:700}}>{s.date}</span>
                  <span style={{color:C.mu,fontSize:10,marginLeft:10}}>{s.environment||"—"}</span>
                </div>
                <div style={{display:"flex",gap:14,alignItems:"center"}}>
                  <span style={{color:sp>=0?C.gr:C.rd,fontSize:13,fontWeight:700}}>{sp>=0?"+":""}{sp.toFixed(0)}</span>
                  <span style={{color:C.mu,fontSize:10}}>{sw}W/{wr2.length-sw}L</span>
                  <span style={{color:s.survived?C.gr:C.fa,fontSize:10}}>{s.survived?"✓ SURVIVED":"—"}</span>
                </div>
              </div>
              {s.sessionNotes&&<div style={{color:C.mu,fontSize:10,fontStyle:"italic"}}>{s.sessionNotes}</div>}
            </div>;
          })}
        </>}
      </div>
    </div>
  );
}

// ─── ROOT APP ────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("logger");
  const [sessions,setSessions]=useState(null);

  useEffect(()=>setSessions(loadSessions()),[]);

  const handleSave=useCallback(newSess=>{
    setSessions(prev=>{
      const existing=prev||[];
      const idx=existing.findIndex(s=>s.id===newSess.id);
      const updated=idx>=0?existing.map((s,i)=>i===idx?newSess:s):[...existing,newSess];
      saveSessions(updated);
      return updated;
    });
  },[]);

  if(sessions===null) return <div style={{...mono,background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.mu,fontSize:12}}>Loading…</div>;

  return (
    <div style={{...mono,background:C.bg,minHeight:"100vh"}}>
      {/* top nav */}
      <div id="topnav" style={{background:"#050505",borderBottom:`4px solid ${C.yl}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
        <div>
          <div style={{color:C.yl,fontSize:9,letterSpacing:"0.25em",fontWeight:900,marginBottom:2}}>KAIZEN TRADE AUTOPSY</div>
          <div style={{color:C.tx,fontSize:16,fontWeight:700,letterSpacing:"0.05em"}}>{tab==="logger"?"SESSION LOG":"PERFORMANCE DASHBOARD"}</div>
        </div>
        <div style={{display:"flex",gap:0,border:`1px solid ${C.b2}`,borderRadius:6,overflow:"hidden"}}>
          <button onClick={()=>setTab("logger")} style={{...mono,padding:"8px 20px",background:tab==="logger"?C.yl:"transparent",color:tab==="logger"?"#050505":C.mu,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:"0.1em",transition:"all .15s"}}>LOGGER</button>
          <button onClick={()=>setTab("dashboard")} style={{...mono,padding:"8px 20px",background:tab==="dashboard"?C.bl:"transparent",color:tab==="dashboard"?"#fff":C.mu,border:"none",borderLeft:`1px solid ${C.b2}`,fontSize:11,fontWeight:700,cursor:"pointer",letterSpacing:"0.1em",transition:"all .15s"}}>
            DASHBOARD{sessions.length>0&&<span style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"1px 6px",fontSize:9,marginLeft:5}}>{sessions.length}</span>}
          </button>
        </div>
      </div>

      {tab==="logger"&&<SessionLogger onSave={handleSave}/>}
      {tab==="dashboard"&&<Dashboard sessions={sessions}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
